<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4 Go Explore — Class Companion</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Lexend:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  --cream:#FDFAF5;
  --warm-white:#FFFEF9;
  --border:#E8E4DC;
  --border-soft:#F0EDE6;
  --text:#1C1A17;
  --text-soft:#5C5650;
  --text-muted:#9C9590;
  --teal:#1D9E75;
  --teal-light:#E3F5EE;
  --teal-mid:#A8DFC8;
  --amber:#D4780A;
  --amber-light:#FEF3E2;
  --amber-mid:#F8C97A;
  --red:#C0392B;
  --red-light:#FDECEA;
  --red-mid:#F0A8A2;
  --blue:#1A6BB5;
  --blue-light:#EAF2FB;
  --blue-mid:#9FC4E8;
  --purple:#5B3FA6;
  --purple-light:#F0ECFB;
  --purple-mid:#C4B3EE;
  --coral:#C0432B;
  --coral-light:#FDE8E4;

  /* Week colours — each week has its own identity */
  --w1:#1A6BB5; --w1-light:#EAF2FB;
  --w2:#1D9E75; --w2-light:#E3F5EE;
  --w3:#D4780A; --w3-light:#FEF3E2;
  --w4:#5B3FA6; --w4-light:#F0ECFB;
  --w5:#C0392B; --w5-light:#FDECEA;
}

body{
  font-family:'Atkinson Hyperlegible',system-ui,sans-serif;
  color:var(--text);
  background:var(--cream);
  min-height:100vh;
  font-size:16px;
  line-height:1.8;
}

h1,h2,h3,.section-title,.class-title,.cb-title,.concept-term,.week-label,.sk-title{
  font-family:'Lexend',system-ui,sans-serif;
}

/* ── LAYOUT ───────────────────────────────── */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}

/* ── SIDEBAR ──────────────────────────────── */
.sidebar{
  background:var(--warm-white);
  border-right:2px solid var(--border);
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.sidebar-header{
  padding:24px 18px 16px;
  border-bottom:2px solid var(--border);
  background:var(--text);
}
.sidebar-title{
  font-family:'Lexend',sans-serif;
  font-size:16px;font-weight:700;
  color:#fff;
  letter-spacing:-0.3px;
}
.sidebar-sub{font-size:12px;color:#aaa;margin-top:3px}

.week-group{border-bottom:2px solid var(--border-soft)}
.week-label{
  padding:14px 18px 6px;
  font-size:10px;font-weight:700;
  color:var(--text-muted);
  text-transform:uppercase;letter-spacing:1.2px;
}

.class-btn{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:10px 18px;
  border:none;background:none;text-align:left;
  cursor:pointer;font-family:inherit;
  transition:all 0.18s;
  border-left:3px solid transparent;
}
.class-btn:hover{background:var(--cream);border-left-color:var(--border)}
.class-btn.active{background:var(--cream);border-left-color:var(--text)}

.cb-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--border);flex-shrink:0;
  transition:all 0.25s;border:2px solid transparent;
}
.cb-dot.done{background:var(--teal);border-color:var(--teal)}
.class-btn.active .cb-dot{border-color:var(--text)}

.cb-info{flex:1;min-width:0}
.cb-title{font-family:'Lexend',sans-serif;font-size:12px;font-weight:600;color:var(--text);line-height:1.35}
.cb-sub{font-size:11px;color:var(--text-muted);margin-top:2px}

/* Week colour accent on active buttons */
.wk1.active{border-left-color:var(--w1);background:var(--w1-light)}
.wk2.active{border-left-color:var(--w2);background:var(--w2-light)}
.wk3.active{border-left-color:var(--w3);background:var(--w3-light)}
.wk4.active{border-left-color:var(--w4);background:var(--w4-light)}
.wk5.active{border-left-color:var(--w5);background:var(--w5-light)}

/* ── MAIN CONTENT ─────────────────────────── */
.main{padding:36px 40px 60px;max-width:900px}

/* ── CLASS HEADER ─────────────────────────── */
.class-header{margin-bottom:32px}
.class-week-tag{
  display:inline-block;
  font-family:'Lexend',sans-serif;
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:1.2px;
  padding:4px 12px;border-radius:20px;
  margin-bottom:12px;
}
.tag-w1{background:var(--w1-light);color:var(--w1)}
.tag-w2{background:var(--w2-light);color:var(--w2)}
.tag-w3{background:var(--w3-light);color:var(--w3)}
.tag-w4{background:var(--w4-light);color:var(--w4)}
.tag-w5{background:var(--w5-light);color:var(--w5)}

.class-title{
  font-size:28px;font-weight:700;
  color:var(--text);line-height:1.2;
  margin-bottom:10px;letter-spacing:-0.5px;
}
.class-desc{
  font-size:16px;color:var(--text-soft);
  line-height:1.75;
  max-width:680px;
  padding:14px 18px;
  background:var(--warm-white);
  border-radius:12px;
  border-left:4px solid var(--border);
}

/* ── SECTIONS ─────────────────────────────── */
.section{
  background:var(--warm-white);
  border:2px solid var(--border);
  border-radius:16px;
  padding:24px;
  margin-bottom:20px;
  transition:border-color 0.2s;
}
.section:hover{border-color:#ccc}

.section-title{
  font-size:15px;font-weight:700;
  color:var(--text);
  margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
  line-height:1.3;
}
.section-icon{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;font-weight:700;
}
.icon-learn{background:var(--blue-light);color:var(--blue)}
.icon-do{background:var(--teal-light);color:var(--teal)}
.icon-warn{background:var(--amber-light);color:var(--amber)}
.icon-tool{background:var(--purple-light);color:var(--purple)}

/* ── CONCEPT CARDS ────────────────────────── */
.concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.concept-grid{grid-template-columns:1fr}}

.concept-card{
  background:var(--cream);
  border-radius:12px;padding:16px;
  border:2px solid var(--border-soft);
  transition:border-color 0.18s,transform 0.18s;
}
.concept-card:hover{border-color:#ccc;transform:translateY(-1px)}

.concept-term{
  font-family:'Lexend',sans-serif;
  font-size:13px;font-weight:700;
  color:var(--text);margin-bottom:6px;
}
.concept-def{font-size:14px;color:var(--text-soft);line-height:1.7}
.concept-example{
  font-size:13px;color:var(--text-muted);
  margin-top:8px;line-height:1.6;
  padding:8px 10px;
  background:var(--warm-white);
  border-radius:8px;
  border-left:3px solid var(--border);
  font-style:italic;
}

/* ── ALERTS ───────────────────────────────── */
.alert{
  border-radius:12px;
  padding:14px 16px;
  font-size:15px;
  line-height:1.7;
  margin-bottom:14px;
  border-left:5px solid transparent;
}
.alert strong{font-family:'Lexend',sans-serif;font-weight:700}
.alert-warn{background:var(--amber-light);border-left-color:var(--amber);color:#6B3A05}
.alert-info{background:var(--teal-light);border-left-color:var(--teal);color:#064E37}
.alert-red{background:var(--red-light);border-left-color:var(--red);color:#7A1F1A}

/* ── CHECKLIST ────────────────────────────── */
.checklist{list-style:none}
.check-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:10px 0;
  border-bottom:1px solid var(--border-soft);
  font-size:15px;line-height:1.65;
  transition:background 0.12s;
}
.check-item:last-child{border-bottom:none}
.check-item:hover{background:var(--cream);margin:0 -8px;padding:10px 8px;border-radius:8px}

.ck{
  width:22px;height:22px;
  border:2px solid var(--border);
  border-radius:6px;
  cursor:pointer;flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:white;
  background:var(--warm-white);
  transition:all 0.18s;
}
.ck.done{background:var(--teal);border-color:var(--teal);transform:scale(1.1)}
.ck:hover:not(.done){border-color:var(--teal);background:var(--teal-light)}
.ck-text{color:var(--text)}
.ck-text.done{text-decoration:line-through;color:var(--text-muted)}

/* ── BUTTONS ──────────────────────────────── */
.btn{
  font-family:'Lexend',sans-serif;
  font-size:13px;font-weight:600;
  padding:8px 18px;border-radius:8px;
  border:2px solid var(--border);
  cursor:pointer;background:var(--warm-white);
  color:var(--text-soft);
  transition:all 0.18s;
  letter-spacing:-0.1px;
}
.btn:hover{background:var(--cream);border-color:#aaa;color:var(--text)}
.btn-dark{background:var(--text);color:#fff;border-color:var(--text)}
.btn-dark:hover{background:#333;border-color:#333}
.btn-green{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-green:hover{background:#168a63;border-color:#168a63}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.save-note{font-size:13px;color:var(--teal);font-weight:600}

/* ── TABS ─────────────────────────────────── */
.data-type-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.dt-tab{
  font-family:'Lexend',sans-serif;
  padding:7px 16px;font-size:13px;font-weight:600;
  cursor:pointer;border:2px solid var(--border);
  border-radius:20px;background:var(--warm-white);
  color:var(--text-soft);transition:all 0.18s;
}
.dt-tab:hover{border-color:#aaa;color:var(--text)}
.dt-tab.active{background:var(--text);color:#fff;border-color:var(--text)}
.dt-panel{display:none}.dt-panel.active{display:block}

/* ── TABLES ───────────────────────────────── */
.source-table{width:100%;border-collapse:collapse;font-size:14px}
.source-table th{
  text-align:left;padding:10px 12px;
  background:var(--cream);
  font-family:'Lexend',sans-serif;font-weight:700;
  color:var(--text-soft);
  border-bottom:2px solid var(--border);
  font-size:12px;text-transform:uppercase;letter-spacing:0.5px;
}
.source-table td{
  padding:10px 12px;border-bottom:1px solid var(--border-soft);
  color:var(--text-soft);vertical-align:top;line-height:1.65;
}
.source-table tr:last-child td{border-bottom:none}
.source-table tr:hover td{background:var(--cream)}
.good{color:var(--teal);font-weight:600}
.bad{color:var(--red);font-weight:600}
.mid{color:var(--amber);font-weight:600}

/* ── FALLACY CARDS ────────────────────────── */
.fallacy-card{
  border:2px solid var(--border);border-radius:12px;
  padding:14px 16px;margin-bottom:10px;
  cursor:pointer;transition:all 0.18s;
  background:var(--warm-white);
}
.fallacy-card:hover{border-color:#aaa;transform:translateY(-1px)}
.fallacy-card.open{border-color:var(--text);background:var(--cream)}
.fallacy-name{
  font-family:'Lexend',sans-serif;
  font-size:14px;font-weight:700;
  color:var(--text);margin-bottom:3px;
  display:flex;justify-content:space-between;align-items:center;
}
.fallacy-name .expand-hint{
  font-size:11px;color:var(--text-muted);font-weight:400;
  padding:2px 8px;border-radius:12px;
  background:var(--cream);border:1px solid var(--border);
  font-family:'Atkinson Hyperlegible',sans-serif;
}
.fallacy-card.open .expand-hint{display:none}
.fallacy-short{font-size:13px;color:var(--text-soft);line-height:1.5}
.fallacy-body{display:none;margin-top:14px;padding-top:14px;border-top:2px solid var(--border-soft)}
.fallacy-card.open .fallacy-body{display:block}
.fallacy-def{font-size:14px;color:var(--text);line-height:1.7;margin-bottom:10px}
.fallacy-ex{
  font-size:13px;color:var(--text-soft);
  padding:12px 14px;
  background:var(--warm-white);border-radius:10px;
  border-left:4px solid var(--amber);line-height:1.65;
}

/* ── BIAS QUIZ ────────────────────────────── */
.bias-scenario{
  background:var(--cream);border-radius:14px;
  padding:18px;margin-bottom:14px;
  border:2px solid var(--border-soft);
}
.bias-text{font-size:15px;line-height:1.75;margin-bottom:14px;color:var(--text)}
.bias-options{display:flex;flex-direction:column;gap:8px}
.bias-opt{
  padding:12px 16px;border-radius:10px;
  border:2px solid var(--border);
  cursor:pointer;font-size:14px;
  background:var(--warm-white);
  font-family:inherit;text-align:left;
  transition:all 0.18s;color:var(--text);
}
.bias-opt:hover{border-color:#aaa;background:var(--warm-white);transform:translateX(2px)}
.bias-opt.correct{background:var(--teal-light);border-color:var(--teal);color:#064E37}
.bias-opt.wrong{background:var(--red-light);border-color:var(--red);color:#7A1F1A}
.bias-feedback{display:none;font-size:14px;margin-top:12px;padding:12px 14px;border-radius:10px;line-height:1.65}
.bias-feedback.show{display:block}
.bf-correct{background:var(--teal-light);color:#064E37;border-left:4px solid var(--teal)}
.bf-wrong{background:var(--red-light);color:#7A1F1A;border-left:4px solid var(--red)}

/* ── NAV ROW ──────────────────────────────── */
.nav-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:32px;padding-top:24px;
  border-top:2px solid var(--border-soft);
}

/* ── FORMS ────────────────────────────────── */
textarea,input[type=text]{
  width:100%;
  font-family:'Atkinson Hyperlegible',sans-serif;
  font-size:15px;color:var(--text);
  background:var(--warm-white);
  border:2px solid var(--border);border-radius:10px;
  padding:12px 14px;outline:none;
  transition:border-color 0.18s;
  line-height:1.7;
}
textarea{resize:vertical;min-height:80px}
textarea:focus,input[type=text]:focus{border-color:var(--teal)}

.w6-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:560px){.w6-grid{grid-template-columns:1fr}}
.w-field{display:flex;flex-direction:column;gap:5px}
.w-field label{font-family:'Lexend',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.w-field .w-hint{font-size:13px;color:var(--text-muted)}

/* ── RESEARCH QUESTION ────────────────────── */
.rq-output{
  background:var(--teal-light);
  border:2px solid var(--teal-mid);
  border-radius:12px;padding:16px;
  min-height:60px;font-size:16px;line-height:1.75;
  color:var(--text);margin-bottom:14px;
  font-style:italic;
}
.rq-placeholder{color:var(--text-muted);font-style:normal;font-size:14px}
.saved-rq{
  background:var(--teal-light);border:2px solid var(--teal-mid);
  border-radius:12px;padding:14px;
  font-size:14px;color:#064E37;
  margin-top:12px;display:none;line-height:1.7;
}

/* ── AI DO/DONT ───────────────────────────── */
.ai-do-dont{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.ai-do-dont{grid-template-columns:1fr}}
.ai-col{border-radius:12px;padding:16px;border:2px solid transparent}
.ai-do{background:var(--teal-light);border-color:var(--teal-mid)}
.ai-dont{background:var(--red-light);border-color:var(--red-mid)}
.ai-col-title{
  font-family:'Lexend',sans-serif;
  font-size:13px;font-weight:700;margin-bottom:10px;
}
.ai-do .ai-col-title{color:#064E37}
.ai-dont .ai-col-title{color:#7A1F1A}
.ai-list{list-style:none;font-size:14px;line-height:1.6}
.ai-list li{
  padding:5px 0;
  border-bottom:1px solid rgba(0,0,0,0.07);
  display:flex;gap:8px;align-items:flex-start;
}
.ai-list li::before{content:'';flex-shrink:0;margin-top:8px;width:6px;height:6px;border-radius:50%;display:block}
.ai-list li:last-child{border-bottom:none}
.ai-do .ai-list li{color:#064E37}
.ai-do .ai-list li::before{background:var(--teal)}
.ai-dont .ai-list li{color:#7A1F1A}
.ai-dont .ai-list li::before{background:var(--red)}

/* ── INTERVIEW BUILDER ────────────────────── */
.interview-builder{display:flex;flex-direction:column;gap:12px}
.iq-row{display:flex;gap:10px;align-items:center}
.iq-num{
  font-family:'Lexend',sans-serif;
  font-size:14px;font-weight:700;color:var(--text-muted);
  width:24px;flex-shrink:0;text-align:center;
}
.iq-input{flex:1}
.iq-del{font-size:20px;color:var(--border);cursor:pointer;border:none;background:none;line-height:1;padding:0 4px;transition:color 0.15s}
.iq-del:hover{color:var(--red)}

/* ── INTERACTIVE BOX ──────────────────────── */
.interactive-box{
  background:var(--cream);border-radius:12px;
  padding:18px;border:2px solid var(--border-soft);
}
.ib-label{
  font-family:'Lexend',sans-serif;
  font-size:11px;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;
}
.ib-question{font-size:16px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.5}
.ib-hint{font-size:14px;color:var(--text-soft);margin-bottom:12px;line-height:1.65}

/* ── GRAPH GRID ───────────────────────────── */
.graph-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:580px){.graph-grid{grid-template-columns:1fr}}
.graph-card{
  border:2px solid var(--border-soft);border-radius:12px;
  padding:14px;background:var(--cream);
  transition:border-color 0.18s,transform 0.18s;
}
.graph-card:hover{border-color:#aaa;transform:translateY(-1px)}
.graph-name{font-family:'Lexend',sans-serif;font-size:14px;font-weight:700;margin-bottom:6px}
.graph-use{font-size:13px;color:var(--text-soft);margin-bottom:6px;line-height:1.5}
.graph-ok{font-size:13px;color:var(--teal);font-weight:600;padding-left:10px;border-left:3px solid var(--teal);margin-bottom:4px}
.graph-not{font-size:13px;color:var(--red);font-weight:600;padding-left:10px;border-left:3px solid var(--red)}

/* ── CODING PROMPT ────────────────────────── */
pre{
  white-space:pre-wrap;font-family:'Atkinson Hyperlegible',monospace;
  font-size:13px;line-height:1.7;color:var(--text-soft);
  background:var(--warm-white);margin:0;padding:14px 16px;
}

/* ── PROGRESS BAR ─────────────────────────── */
.pm-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;flex:1}
.pm-fill{height:100%;background:var(--teal);border-radius:3px;transition:width 0.4s}
.pm-text{font-size:13px;color:var(--text-muted)}

/* ── MOBILE ───────────────────────────────── */
@media(max-width:720px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;border-right:none;border-bottom:2px solid var(--border)}
  .main{padding:20px 18px 40px}
  .class-title{font-size:22px}
}
</style>
</head>
<body>
<div class="app">

<nav class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">M4 Go Explore</div>
    <div class="sidebar-sub">Class companion · 2025–2026</div>
  </div>

  <div class="week-group">
    <div class="week-label">Week 1</div>
    <button class="class-btn wk1 active" onclick="go('w1c1')" id="btn-w1c1">
      <div class="cb-dot" id="dot-w1c1"></div>
      <div class="cb-info"><div class="cb-title">Making a research question</div><div class="cb-sub">Class 1</div></div>
    </button>
    <button class="class-btn wk1" onclick="go('w1c2')" id="btn-w1c2">
      <div class="cb-dot" id="dot-w1c2"></div>
      <div class="cb-info"><div class="cb-title">Information literacy &amp; APA intro</div><div class="cb-sub">Class 2</div></div>
    </button>
  </div>

  <div class="week-group">
    <div class="week-label">Week 2</div>
    <button class="class-btn wk2" onclick="go('w2c1')" id="btn-w2c1">
      <div class="cb-dot" id="dot-w2c1"></div>
      <div class="cb-info"><div class="cb-title">Logical fallacies &amp; AI</div><div class="cb-sub">Class 1</div></div>
    </button>
    <button class="class-btn wk2" onclick="go('w2c2')" id="btn-w2c2">
      <div class="cb-dot" id="dot-w2c2"></div>
      <div class="cb-info"><div class="cb-title">Interview design</div><div class="cb-sub">Class 2</div></div>
    </button>
  </div>

  <div class="week-group">
    <div class="week-label">Week 3</div>
    <button class="class-btn wk3" onclick="go('w3c1')" id="btn-w3c1">
      <div class="cb-dot" id="dot-w3c1"></div>
      <div class="cb-info"><div class="cb-title">Quantitative data types</div><div class="cb-sub">Class 1</div></div>
    </button>

}
function loadCookie(){
  try{
    const m=document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith(COOKIE_KEY+'='));

}

function go(id) {
  currentClass = id;
  document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-'+id);
  if(btn) btn.classList.add('active');

  main.innerHTML = `

    <div class="nav-row">
      ${prevClass(id) ? `<button class="btn btn-dark" onclick="go('${prevClass(id)}')">← Previous</button>` : '<span></span>'}

  restoreChecks();

const classOrder = ['w1c1','w1c2','w2c1','w2c2','w3c1','w3c2','w4c1','w4c2','w5c1'];
function nextClass(id){ const i=classOrder.indexOf(id); return i<classOrder.length-1?classOrder[i+1]:null; }
function prevClass(id){ const i=classOrder.indexOf(id); return i>0?classOrder[i-1]:null; }

function ck(id, label) {
  return `<li class="check-item"><div class="ck" id="ck-${id}" onclick="tick('ck-${id}')">${state['ck-'+id]?'✓':''}</div><span class="ck-text ${state['ck-'+id]?'done':''}">${label}</span></li>`;
}

function tick(id) {
  const el = document.getElementById(id);
  if(!el) return;
  const done = !el.classList.contains('done');
  el.classList.toggle('done', done);
  el.textContent = done ? '✓' : '';
  const txt = el.nextElementSibling;
  if(txt) txt.classList.toggle('done', done);
  state[id] = done;
  saveCookie(state);
  updateDots();
}

function restoreChecks() {
  Object.keys(state).forEach(k => {
    if(!state[k]) return;
    const el = document.getElementById(k);
    if(!el) return;
    el.classList.add('done');
    el.textContent = '✓';
    const txt = el.nextElementSibling;
    if(txt) txt.classList.add('done');
  });
  updateDots();
}

function updateDots() {
  // per-class dot: green if any task in that class is done
  classOrder.forEach(cls => {
    const dot = document.getElementById('dot-'+cls);
    if(!dot) return;
    // check if saved rq or any ck for this class
    const relevant = Object.keys(state).filter(k => (k.includes(cls) || k.startsWith('ck-'+cls)) && state[k]);
    if(relevant.length > 0) dot.classList.add('done');
  });
}

function buildRQ() {
  const who = document.getElementById('w6-who')?.value.trim();
  const what = document.getElementById('w6-what')?.value.trim();
  const where = document.getElementById('w6-where')?.value.trim();
  const when = document.getElementById('w6-when')?.value.trim();
  const why = document.getElementById('w6-why')?.value.trim();
  const how = document.getElementById('w6-how')?.value.trim();

  const fields = {who,what,where,when,why,how};
  state['w1c1-rq-fields'] = fields;
  saveCookie(state);

  const hasAny = Object.values(fields).some(v => v);
  const preview = document.getElementById('rq-preview');
  if(!preview) return;
  if(!hasAny) {
    preview.innerHTML = '<span class="rq-placeholder">Fill in the fields above and your research question will appear here…</span>';
    return;
  }

  const w = what || '[what]';
  const wh = where || '[where]';
  const wn = when ? ' ' + when : '';
  const wy = why ? ', ' + why : '';
  const hw = how ? ' — explored ' + how : '';
  const forWho = who ? `For ${who}: ` : '';
  preview.innerHTML = `${forWho}What are ${w} at ${wh}${wn}${wy}?${hw}`;
}

function saveRQ() {
  const val = document.getElementById('rq-final')?.value;
  state['w1c1-rq-final'] = val;

function saveRQBtn() {

}

  el.style.display = 'block';

}

const biasScenarios = [
  {
    text: 'A hotel chain publishes a report on its own website titled "Why [Country] is the Best Destination for International Interns — Our Hotel Leads the Way."',
    options: ['No bias — it is a professional document','Confirmation bias — it only presents positive information to promote itself','Selection bias — the sample is too small','Anchoring bias — the title uses a number'],
    correct: 1,
    feedback: 'Correct. A company publishing positive information about itself is a classic example of promotional/confirmation bias. It is not a neutral source. You can reference it for factual details (opening hours, services), but not for objective assessments of the destination or the hotel.'
  },
  {
    text: 'A peer-reviewed article from 2009 about Hofstede\'s cultural dimensions argues that individualism scores predict employee behaviour.',
    options: ['No issues — it is peer-reviewed so it is reliable','Currency concern — the data may be outdated for current market analysis','Survivorship bias','Selection bias — only hotels were studied'],
    correct: 1,
    feedback: 'Correct. Peer-reviewed is generally reliable, but currency matters. For cultural theory (Hofstede\'s dimensions themselves), a 2009 article may still be valid. For current market data or recent developments, you would need more recent sources. Always check: could things have changed significantly since this was published?'

    correct: 1,

let biasAnswered = [];

function renderBiasQuiz() {
  const container = document.getElementById('bias-quiz');
  if(!container) return;
  biasScenarios.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'bias-scenario';
    div.innerHTML = `<div class="bias-text"><strong>Scenario ${i+1}:</strong> ${s.text}</div>
    <div class="bias-options">${s.options.map((o,j) => `<button class="bias-opt" onclick="answerBias(${i},${j})" id="bias-${i}-${j}">${o}</button>`).join('')}</div>
    <div class="bias-feedback" id="bias-fb-${i}"></div>`;
    container.appendChild(div);
  });
}

function answerBias(scenario, choice) {
  if(biasAnswered.includes(scenario)) return;
  biasAnswered.push(scenario);
  const s = biasScenarios[scenario];
  const correct = choice === s.correct;
  for(let j=0;j<s.options.length;j++){
    const btn = document.getElementById(`bias-${scenario}-${j}`);
    if(!btn) continue;
    btn.disabled = true;
    if(j === s.correct) btn.classList.add('correct');
    else if(j === choice && !correct) btn.classList.add('wrong');
  }
  const fb = document.getElementById(`bias-fb-${scenario}`);
  if(fb) {
    fb.classList.add('show', correct ? 'bf-correct' : 'bf-wrong');
    fb.textContent = (correct ? 'Correct. ' : 'Not quite. ') + s.feedback;
  }
}

    {name:'Straw man', short:'Misrepresenting an argument to make it easier to attack', def:'Distorting or exaggerating someone\'s position so you can argue against a weaker version of it.', ex:'"The hotel claims to be sustainable because it uses LED lights. So they think changing a lightbulb solves climate change." — This misrepresents what the hotel actually claimed.'},
    {name:'Appeal to authority', short:'Something is true because an expert said so', def:'Using someone\'s authority or status as the main reason to accept a claim, without engaging with the actual evidence.', ex:'"Hofstede said individualism scores predict behaviour, so it must be true." Hofstede\'s work is valuable, but you still need to explain the evidence and acknowledge critiques.'},
    {name:'Hasty generalisation', short:'Drawing broad conclusions from too few examples', def:'Making a sweeping claim based on a small or unrepresentative sample.', ex:'"I interviewed two people from Japan and they both said they avoid direct criticism of managers — so Japanese corporate culture is highly hierarchical." Two interviews cannot support a national generalisation.'},

  </div>
  `;

  renderIQBuilder();
}

function renderIQBuilder() {
  const container = document.getElementById('iq-builder');
  if(!container) return;
  const saved = state['w2c2-questions'] || [''];
  container.innerHTML = '';
  saved.forEach((q, i) => {
    addIQRow(container, i, q);
  });
}

function addIQRow(container, i, val) {
  const row = document.createElement('div');
  row.className = 'iq-row';
  row.id = 'iq-row-'+i;
  row.innerHTML = `<span class="iq-num">${i+1}</span><input type="text" class="iq-input" id="iq-${i}" value="${val||''}" placeholder="e.g. How would you describe the communication style between staff and management at the hotel?" oninput="saveIQs()"><button class="iq-del" onclick="delIQ(${i})">×</button>`;
  container.appendChild(row);
}

function addIQ() {
  const saved = state['w2c2-questions'] || [];
  saved.push('');
  state['w2c2-questions'] = saved;
  saveCookie(state);
  renderIQBuilder();
}

function delIQ(i) {
  const saved = state['w2c2-questions'] || [];
  saved.splice(i,1);
  state['w2c2-questions'] = saved;
  saveCookie(state);
  renderIQBuilder();
}

function saveIQs() {
  const container = document.getElementById('iq-builder');
  if(!container) return;
  const inputs = container.querySelectorAll('.iq-input');
  const qs = Array.from(inputs).map(i => i.value);
  state['w2c2-questions'] = qs;
  saveCookie(state);
  const note = document.getElementById('iq-note');
  if(note) { note.textContent = 'Saved'; setTimeout(()=>note.textContent='',1500); }
}

function renderW3C1(el) {

        <div class="concept-example"><strong>Hotel examples:</strong> Star rating of hotel (3-star vs 4-star) → ordinal · Service level rating "very good" → ordinal (part of a Likert scale) · Guest satisfaction score → ordinal · Hofstede dimension category (Low/Medium/High) → ordinal</div>
      </div>
      <div class="alert alert-info">What you CAN do: rank, find median, create ordered bar charts.<br>What you CANNOT do: say a 4-star hotel is "twice as good" as a 2-star — the gaps between ranks are not guaranteed equal.</div>
    </div>
    <div id="dt-interval" class="dt-panel">
      <div class="concept-card" style="margin-bottom:10px">
        <div class="concept-term">Interval — equal gaps, no true zero</div>

  <div class="section">

// ─── W4C1 ────────────────────────────────────────────────────────
function renderW4C1(el) {
  el.innerHTML = `
  <div class="section">
    <div class="section-title"><span class="section-icon icon-learn">?</span>From transcript to analysis — why we code</div>
    <p style="font-size:13px;color:#444;line-height:1.6;margin-bottom:10px">A transcript is raw data — it is not analysis. Coding is the process of reading through transcripts systematically and labelling the content so you can find patterns across multiple interviews. Without coding, you cannot write "my interviewees suggest that…" — you can only repeat individual quotes.</p>
    <p style="font-size:13px;color:#444;line-height:1.6;margin-bottom:10px">The approach used in this module is called <strong>grounded theory coding</strong>, which has three phases:</p>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="concept-term">Phase 1: Open coding</div>
        <div class="concept-def">Paraphrase each piece of text to make it manageable. Think of a suitable description for each fragment — unravel the text into short labels.</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">Phase 2: Axial coding</div>
        <div class="concept-def">Group the coded terms. Look for similarities and differences. Create main groups (axes/themes) from your open codes.</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">Phase 3: Selective coding</div>
        <div class="concept-def">Look for relationships between the grouped themes. How do the categories connect to your theoretical framework and research question?</div>
      </div>
    </div>
    <div class="alert alert-red" style="margin-top:10px">Coding is a conditional (C) criterion. Your coding matrix must appear in Appendix C showing both open and axial coding. Missing or superficial coding fails the report regardless of how good the rest is.</div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-learn">?</span>Step 1 — Transcribe your interviews first</div>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="concept-term">By hand</div>

  <div class="section">

    <p style="font-size:13px;color:#444;line-height:1.6;margin-bottom:12px">Open coding means reading through a transcript and attaching a short label to each meaningful fragment. You are paraphrasing what the speaker expressed — stay close to their words, do not interpret yet.</p>

      </table>
      <p style="font-size:11px;color:#888;margin-top:8px">Apply exactly this logic to your culture interviews — label what the interviewee is expressing about hierarchy, communication style, working culture, etc.</p>
    </div>
    <div class="alert alert-info">For your hotel assignment, open code every meaningful statement about culture, corporate culture, working conditions, management style, sustainability practices, or market conditions. Do this for all interviews before moving to step 3.</div>

    <p style="font-size:13px;color:#444;line-height:1.6;margin-bottom:12px">Once you have open coded all transcripts, look for patterns. Which open codes are really talking about the same thing? Group them into broader categories (axes). These must link to your theoretical framework.</p>

    <p style="font-size:13px;color:#444;line-height:1.6;margin-bottom:10px">The matrix shows which themes (axial codes) appeared in which interviews, and what each interviewee said (open codes) under each theme. Not every interviewee will have something pertaining to every axial code — leave the cell blank if they said nothing about that theme.</p>

      </tbody>
    </table>
    </div>
    <div class="alert alert-info">A theme that appears across all three or four interviews is stronger evidence than one that appears in only one. Note this in your report: "This theme was identified across all interviews, suggesting…" vs "One interviewee mentioned…"</div>
  </div>

  <div class="section">

    <div style="border:1px solid #e5e4df;border-radius:8px;overflow:hidden;margin-bottom:10px">

1. Find recurring themes across all interviews — these will be our AXIAL CODES.
2. Under each interviewee, paraphrase their relevant quotes into OPEN CODES that support those axial codes.
3. Make a CODING MATRIX showing: rows = axial codes, columns = each interviewee, cells = the open codes (paraphrased quotes) from that interviewee that support the axial code. Leave cells blank where an interviewee said nothing about that theme.

The axial codes should relate to cultural dimensions (e.g. Hofstede's Power Distance, Individualism, Uncertainty Avoidance) or corporate culture concepts where relevant.

[PASTE INTERVIEW TRANSCRIPTS HERE]</pre>
    </div>

      </div>

      </div>
    </div>
  </div>

    </ul>
  </div>
  `;
}

}

}

          <tr><td>Title Case In Article Titles</td><td>Sentence case only — first word + proper nouns</td></tr>
          <tr><td>Graph with no caption or no source</td><td>Figure N. <em>Title.</em> From Source (Year). URL</td></tr>
          <tr><td>Interview in reference list</td><td>Personal communications are in-text only — remove from reference list</td></tr>
          <tr><td>Citation in text but not in reference list</td><td>Cross-check every in-text citation against reference list</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-tool">✓</span>Pre-submission: conditional criteria check</div>
    <p style="font-size:13px;color:#444;margin-bottom:10px">Every item below must be YES. A single NO on any conditional criterion = report fail.</p>
    <ul class="checklist">
      ${ck('w5c1-c1','Ethics & integrity: no plagiarism, AI use disclosed, professional academic tone throughout')}
      ${ck('w5c1-c2','Language & structure: grammar checked, APA7 headings numbered (1. / 1.1 / 1.1.1), Calibri 11 or TNR 12, line spacing 1.0, page numbers centred at bottom')}
      ${ck('w5c1-c3','Word count: Introduction + Body + Conclusion = 2,700–3,300 words (title, references, appendices not counted)')}
      ${ck('w5c1-c4','Sources: at least one piece of course literature cited; all sources recent and relevant')}
      ${ck('w5c1-c5','Interviews: questions based on a named cultural model; interview findings cited in the body text — not just in the appendix')}
      ${ck('w5c1-c6','Appendix A: interview topic list with all sample questions present')}
      ${ck('w5c1-c7','Appendix B: full transcripts for all interviews, minimum 3, clearly labelled with speakers identified')}
      ${ck('w5c1-c8','Appendix C: coding matrix showing open codes, axial categories, and which interview each theme appeared in')}
    </ul>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-tool">✓</span>Lenient criteria — at most 2 NOs allowed</div>
    <ul class="checklist">
      ${ck('w5c1-l1','Topics are explained and justified in relation to the assignment — not just described')}
      ${ck('w5c1-l2','Insights are nuanced — no sweeping generalisations, complexity acknowledged')}
      ${ck('w5c1-l3','National/regional culture: named cultural theory + interview evidence both present')}
      ${ck('w5c1-l4','Corporate culture: theory + interview evidence both present')}
      ${ck('w5c1-l5','SDGs: explained as relevant to the specific national/regional context — not described generically')}
      ${ck('w5c1-l6','Market environment: macro level (PESTLE or similar) AND micro level (Porter/competition) covered')}
      ${ck('w5c1-l7','Competitor analysis included and named specifically')}
      ${ck('w5c1-l8','Quantitative info: 3 different sources, descriptive statistics, 2+ graph types, each graph interpreted in text')}
    </ul>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-warn">!</span>The four most common last-minute failures</div>
    <div class="concept-grid">
      <div class="concept-card" style="background:#FCEBEB;border-color:#F09595">
        <div class="concept-term" style="color:#791F1F">Interview results not in the body</div>
        <div class="concept-def" style="color:#791F1F">Transcripts only in appendix, never cited in chapters. This fails the conditional criterion. Every insight used must appear in the body text with a personal communication citation.</div>
      </div>
      <div class="concept-card" style="background:#FCEBEB;border-color:#F09595">
        <div class="concept-term" style="color:#791F1F">Graphs described, not interpreted</div>
        <div class="concept-def" style="color:#791F1F">"Figure 1 shows occupancy was 72% in 2019." Your reader can see that. Interpret it: explain cause, significance, and what it means for a future intern at this specific hotel.</div>
      </div>
      <div class="concept-card" style="background:#FCEBEB;border-color:#F09595">
        <div class="concept-term" style="color:#791F1F">SDGs described, not contextualised</div>
        <div class="concept-def" style="color:#791F1F">"SDG 8 is about decent work." That describes the goal. You need to explain WHY SDG 8 is specifically relevant in your destination's national or regional context.</div>
      </div>
      <div class="concept-card" style="background:#FCEBEB;border-color:#F09595">
        <div class="concept-term" style="color:#791F1F">Reference list mismatch</div>
        <div class="concept-def" style="color:#791F1F">Sources in the text not in the list, or list entries never cited. Cross-check every in-text citation against every reference list entry — both directions.</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-tool">AI</span>Final AI check prompt — run this on your full report</div>
    <div style="border:1px solid #e5e4df;border-radius:8px;overflow:hidden">
      <div style="padding:10px 14px;background:#f8f7f4;font-size:12px;font-weight:600;color:#1a1a1a;display:flex;justify-content:space-between;align-items:center">
        Final pre-submission check prompt
        <button class="btn" style="font-size:11px;padding:4px 10px" onclick="copyFinalPrompt()">Copy</button>
      </div>
      <pre id="final-prompt" style="padding:12px 14px;font-size:12px;line-height:1.6;white-space:pre-wrap;font-family:inherit;color:#444;background:#fff;margin:0">You are assessing a first-year hospitality management report. For each CONDITIONAL criterion below, give YES or NO with a short reason:

1. Ethics and integrity: no plagiarism, AI use disclosed, professional tone
2. Language and presentation: grammar correct, APA7 formatting, headings numbered
3. Word count: estimate words in introduction + body + conclusion (target: 2,700–3,300)
4. Sources: course literature cited, sources recent and relevant
5. Interviews: questions linked to a named cultural theory; findings cited in the body text
6. Appendices: text refers to Appendix A (topic list), B (transcripts), C (coding matrix)

Then provide:
- The 3 most urgent changes to make before submission
- Any unsupported claims that need a citation added
- Any sentences that appear AI-generated without disclosure

[PASTE YOUR FULL REPORT HERE]</pre>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-learn">?</span>Defence preparation — practise these questions now</div>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="concept-term">Problem &amp; goal</div>
        <div class="concept-def">Why did you choose this information? What did you leave out and why? How does your report connect to the assignment context?</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">Information literacy</div>
        <div class="concept-def">How did you find your sources? How did you distinguish relevant from irrelevant? What would you do differently? (Lessons learned)</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">Research methods</div>
        <div class="concept-def">Why semi-structured interviews? Walk through your exact steps. What were the limitations of your approach?</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">Helicopter view</div>
        <div class="concept-def">Can you zoom out and compare what you found to your own frame of reference? What surprised you? Critical reflection on the whole process.</div>
      </div>
    </div>
    <div class="alert alert-info" style="margin-top:10px">The best defence preparation is to have written the report yourself. You cannot defend work you do not understand. Be specific — "I started with Google Scholar to find…" not "I did research."</div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-do">✓</span>Final checklist</div>
    <ul class="checklist">
      ${ck('w5c1-final1','All conditional criteria ticked above')}
      ${ck('w5c1-final2','At most 2 NOs on lenient criteria')}
      ${ck('w5c1-final3','Every in-text citation has a matching reference list entry — and vice versa')}
      ${ck('w5c1-final4','All figures have a numbered title and APA caption with source below')}
      ${ck('w5c1-final5','I have run the final AI check prompt on my full report')}
      ${ck('w5c1-final6','I have read the report aloud for grammar and flow')}
      ${ck('w5c1-final7','I can answer all four defence questions above in my own words')}
    </ul>
  </div>
  `;
}
function setApaTab(id, btn) {
  document.querySelectorAll('#apa-tabs .dt-tab').forEach(t=>t.classList.remove('active'));
  ['journal','book','website','report','figure','interview'].forEach(p=>{
    const el=document.getElementById('apapanel-'+p);
    if(el)el.classList.remove('active');
  });
  btn.classList.add('active');
  const panel=document.getElementById('apapanel-'+id);
  if(panel)panel.classList.add('active');
}

function copyFinalPrompt() {
  const el = document.getElementById('final-prompt');
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).catch(()=>{});
  const btn = el.previousElementSibling.querySelector('button');
  if(btn){const o=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=o,1500);}
}

// ─── INIT ────────────────────────────────────────────────────────
function init() {
  state = loadCookie();
  go('w1c1');
}

init();
</script>
