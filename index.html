<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4 Go Explore — Class Companion</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#1a1a1a;background:#f5f4f0;min-height:100vh}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:#fff;border-right:1px solid #e5e4df;padding:0;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar-header{padding:20px 16px 12px;border-bottom:1px solid #e5e4df}
.sidebar-title{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.sidebar-sub{font-size:11px;color:#888}
.week-group{border-bottom:1px solid #f0efe9}
.week-label{padding:10px 16px 4px;font-size:10px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:0.6px}
.class-btn{display:flex;align-items:center;gap:10px;width:100%;padding:8px 16px;border:none;background:none;text-align:left;cursor:pointer;font-family:inherit;transition:background 0.12s}
.class-btn:hover{background:#f5f4f0}
.class-btn.active{background:#1a1a1a}
.class-btn.active .cb-title{color:#fff}
.class-btn.active .cb-sub{color:#aaa}
.class-btn.active .cb-dot{background:#4ade80}
.cb-dot{width:8px;height:8px;border-radius:50%;background:#e5e4df;flex-shrink:0;transition:background 0.2s}
.cb-dot.done{background:#1D9E75}
.cb-info{flex:1;min-width:0}
.cb-title{font-size:12px;font-weight:500;color:#1a1a1a;line-height:1.3}
.cb-sub{font-size:10px;color:#999;margin-top:1px}
.main{padding:32px 36px;max-width:860px}
.class-header{margin-bottom:24px}
.class-week-tag{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.6px;color:#888;margin-bottom:6px}
.class-title{font-size:24px;font-weight:600;color:#1a1a1a;line-height:1.3;margin-bottom:6px}
.class-desc{font-size:14px;color:#666;line-height:1.6}
.section{background:#fff;border:1px solid #e5e4df;border-radius:12px;padding:20px;margin-bottom:16px}
.section-title{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-icon{width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.icon-learn{background:#E6F1FB;color:#0C447C}
.icon-do{background:#E1F5EE;color:#085041}
.icon-warn{background:#FAEEDA;color:#633806}
.icon-tool{background:#EEEDFE;color:#3C3489}
.concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:640px){.concept-grid{grid-template-columns:1fr}}
.concept-card{background:#f8f7f4;border-radius:8px;padding:12px;border:1px solid #eee}
.concept-term{font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.concept-def{font-size:12px;color:#555;line-height:1.5}
.concept-example{font-size:11px;color:#888;margin-top:4px;font-style:italic;padding-left:8px;border-left:2px solid #e5e4df}
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.pill{font-size:12px;padding:4px 10px;border-radius:20px;border:1px solid #e5e4df;background:#f8f7f4;color:#555;cursor:pointer;font-family:inherit;transition:all 0.15s}
.pill:hover{border-color:#999;color:#1a1a1a}
.pill.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.interactive-box{background:#f8f7f4;border-radius:10px;padding:16px;border:1px solid #e5e4df}
.ib-label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.ib-question{font-size:14px;font-weight:500;color:#1a1a1a;margin-bottom:8px;line-height:1.4}
.ib-hint{font-size:12px;color:#888;margin-bottom:10px;line-height:1.5}
textarea{width:100%;font-family:inherit;font-size:13px;color:#1a1a1a;background:#fff;border:1px solid #e5e4df;border-radius:6px;padding:10px;resize:vertical;min-height:70px;outline:none;transition:border-color 0.15s;line-height:1.5}
textarea:focus{border-color:#999}
input[type=text]{width:100%;font-family:inherit;font-size:13px;color:#1a1a1a;background:#fff;border:1px solid #e5e4df;border-radius:6px;padding:9px 10px;outline:none;transition:border-color 0.15s}
input[type=text]:focus{border-color:#999}
.w6-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
@media(max-width:560px){.w6-grid{grid-template-columns:1fr}}
.w-field{display:flex;flex-direction:column;gap:4px}
.w-field label{font-size:12px;font-weight:600;color:#1a1a1a}
.w-field .w-hint{font-size:11px;color:#888;margin-bottom:2px}
.rq-output{background:#fff;border:1px solid #e5e4df;border-radius:8px;padding:14px;min-height:52px;font-size:14px;line-height:1.7;color:#1a1a1a;margin-bottom:10px;font-style:italic}
.rq-placeholder{color:#bbb;font-style:normal;font-size:13px}
.btn{font-size:12px;padding:7px 14px;border-radius:6px;border:1px solid #ccc;cursor:pointer;background:#fff;color:#444;font-family:inherit;transition:all 0.15s}
.btn:hover{background:#f0efe9;border-color:#999}
.btn-dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-dark:hover{background:#333}
.btn-green{background:#1D9E75;color:#fff;border-color:#1D9E75}
.btn-green:hover{background:#0F6E56}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.save-note{font-size:11px;color:#aaa}
.checklist{list-style:none}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid #f0efe9;font-size:13px;line-height:1.5}
.check-item:last-child{border-bottom:none}
.ck{width:17px;height:17px;border:1.5px solid #ccc;border-radius:3px;cursor:pointer;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:10px;color:white;background:#fff;transition:all 0.15s}
.ck.done{background:#1D9E75;border-color:#1D9E75}
.ck:hover:not(.done){border-color:#1D9E75}
.ck-text.done{text-decoration:line-through;color:#aaa}
.alert{border-radius:8px;padding:10px 14px;font-size:13px;line-height:1.6;margin-bottom:12px}
.alert-warn{background:#FAEEDA;border:1px solid #FAC775;color:#633806}
.alert-info{background:#E1F5EE;border:1px solid #9FE1CB;color:#085041}
.alert-red{background:#FCEBEB;border:1px solid #F09595;color:#791F1F}
.fallacy-card{border:1px solid #e5e4df;border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:border-color 0.15s}
.fallacy-card:hover{border-color:#999}
.fallacy-card.open{border-color:#1a1a1a}
.fallacy-name{font-size:13px;font-weight:600;color:#1a1a1a;margin-bottom:2px;display:flex;justify-content:space-between}
.fallacy-short{font-size:12px;color:#666}
.fallacy-body{display:none;margin-top:10px;padding-top:10px;border-top:1px solid #f0efe9}
.fallacy-card.open .fallacy-body{display:block}
.fallacy-def{font-size:13px;color:#444;line-height:1.6;margin-bottom:6px}
.fallacy-ex{font-size:12px;color:#888;font-style:italic;padding:8px;background:#f8f7f4;border-radius:6px;line-height:1.5}
.source-table{width:100%;border-collapse:collapse;font-size:12px}
.source-table th{text-align:left;padding:6px 10px;background:#f8f7f4;font-weight:600;color:#555;border-bottom:1px solid #e5e4df}
.source-table td{padding:6px 10px;border-bottom:1px solid #f0efe9;color:#444;vertical-align:top;line-height:1.5}
.source-table tr:last-child td{border-bottom:none}
.good{color:#085041}.bad{color:#791F1F}.mid{color:#633806}
.data-type-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.dt-tab{padding:6px 12px;font-size:12px;cursor:pointer;border:1px solid #e5e4df;border-radius:6px;background:#f8f7f4;color:#666;font-family:inherit;transition:all 0.15s}
.dt-tab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.dt-panel{display:none}.dt-panel.active{display:block}
.graph-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:580px){.graph-grid{grid-template-columns:1fr}}
.graph-card{border:1px solid #e5e4df;border-radius:8px;padding:12px;background:#f8f7f4}
.graph-name{font-size:12px;font-weight:600;margin-bottom:4px}
.graph-use{font-size:11px;color:#666;margin-bottom:4px;line-height:1.4}
.graph-ok{font-size:11px;color:#085041}
.graph-not{font-size:11px;color:#791F1F}
.interview-builder{display:flex;flex-direction:column;gap:10px}
.iq-row{display:flex;gap:8px;align-items:center}
.iq-num{font-size:12px;font-weight:600;color:#888;width:18px;flex-shrink:0}
.iq-input{flex:1}
.iq-del{font-size:18px;color:#ccc;cursor:pointer;border:none;background:none;line-height:1;padding:0 4px;transition:color 0.15s}
.iq-del:hover{color:#A32D2D}
.bias-scenario{background:#f8f7f4;border-radius:8px;padding:14px;margin-bottom:10px;border:1px solid #e5e4df}
.bias-text{font-size:13px;line-height:1.6;margin-bottom:10px}
.bias-options{display:flex;flex-direction:column;gap:6px}
.bias-opt{padding:8px 12px;border-radius:6px;border:1px solid #e5e4df;cursor:pointer;font-size:12px;background:#fff;font-family:inherit;text-align:left;transition:all 0.15s;color:#1a1a1a}
.bias-opt:hover{border-color:#999}
.bias-opt.correct{background:#E1F5EE;border-color:#9FE1CB;color:#085041}
.bias-opt.wrong{background:#FCEBEB;border-color:#F09595;color:#791F1F}
.bias-feedback{display:none;font-size:12px;margin-top:8px;padding:8px;border-radius:6px;line-height:1.5}
.bias-feedback.show{display:block}
.bf-correct{background:#E1F5EE;color:#085041}
.bf-wrong{background:#FCEBEB;color:#791F1F}
.nav-row{display:flex;justify-content:space-between;margin-top:24px;padding-top:20px;border-top:1px solid #e5e4df}
.progress-mini{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.pm-bar{flex:1;height:4px;background:#e5e4df;border-radius:2px;overflow:hidden}
.pm-fill{height:100%;background:#1D9E75;border-radius:2px;transition:width 0.4s}
.pm-text{font-size:12px;color:#888;white-space:nowrap}
.saved-rq{background:#E1F5EE;border:1px solid #9FE1CB;border-radius:8px;padding:12px;font-size:13px;color:#085041;margin-top:10px;display:none;line-height:1.6}
.ai-do-dont{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:520px){.ai-do-dont{grid-template-columns:1fr}}
.ai-col{border-radius:8px;padding:12px}
.ai-do{background:#E1F5EE;border:1px solid #9FE1CB}
.ai-dont{background:#FCEBEB;border:1px solid #F09595}
.ai-col-title{font-size:12px;font-weight:600;margin-bottom:8px}
.ai-do .ai-col-title{color:#085041}
.ai-dont .ai-col-title{color:#791F1F}
.ai-list{list-style:none;font-size:12px;line-height:1.5}
.ai-list li{padding:3px 0;border-bottom:1px solid rgba(0,0,0,0.06)}
.ai-list li:last-child{border-bottom:none}
.ai-do .ai-list li{color:#085041}
.ai-dont .ai-list li{color:#791F1F}
@media(max-width:700px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;border-right:none;border-bottom:1px solid #e5e4df}
  .main{padding:20px 16px}
}
</style>
</head>
<body>
<div class="app">

<nav class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">M4 Go Explore</div>
    <div class="sidebar-sub">Class companion · 2025–2026</div>
  </div>

  <div class="week-group">
    <div class="week-label">Week 1</div>
    <button class="class-btn active" onclick="go('w1c1')" id="btn-w1c1">

      <div class="cb-info"><div class="cb-title">Making a research question</div><div class="cb-sub">Class 1</div></div>

    <button class="class-btn" onclick="go('w1c2')" id="btn-w1c2">
      <div class="cb-dot" id="dot-w1c2"></div>

    </button>
  </div>

  <div class="week-group">
    <div class="week-label">Week 2</div>
    <button class="class-btn" onclick="go('w2c1')" id="btn-w2c1">
      <div class="cb-dot" id="dot-w2c1"></div>
      <div class="cb-info"><div class="cb-title">Logical fallacies &amp; AI</div><div class="cb-sub">Class 1</div></div>
    </button>
    <button class="class-btn" onclick="go('w2c2')" id="btn-w2c2">
      <div class="cb-dot" id="dot-w2c2"></div>
      <div class="cb-info"><div class="cb-title">Interview design</div><div class="cb-sub">Class 2</div></div>
    </button>
  </div>

  <div class="week-group">
    <div class="week-label">Week 3</div>
    <button class="class-btn" onclick="go('w3c1')" id="btn-w3c1">
      <div class="cb-dot" id="dot-w3c1"></div>
      <div class="cb-info"><div class="cb-title">Quantitative data types</div><div class="cb-sub">Class 1</div></div>
    </button>
    <button class="class-btn" onclick="go('w3c2')" id="btn-w3c2">
      <div class="cb-dot" id="dot-w3c2"></div>
      <div class="cb-info"><div class="cb-title">Graphs &amp; market analysis</div><div class="cb-sub">Class 2</div></div>
    </button>
  </div>

  <div class="week-group">
    <div class="week-label">Week 4</div>
    <button class="class-btn" onclick="go('w4c1')" id="btn-w4c1">
      <div class="cb-dot" id="dot-w4c1"></div>
      <div class="cb-info"><div class="cb-title">Coding interviews</div><div class="cb-sub">Class 1</div></div>
    </button>
    <button class="class-btn" onclick="go('w4c2')" id="btn-w4c2">
      <div class="cb-dot" id="dot-w4c2"></div>
      <div class="cb-info"><div class="cb-title">Write &amp; get feedback</div><div class="cb-sub">Class 2</div></div>
    </button>
  </div>

  <div class="week-group">
    <div class="week-label">Week 5</div>
    <button class="class-btn" onclick="go('w5c1')" id="btn-w5c1">
      <div class="cb-dot" id="dot-w5c1"></div>
      <div class="cb-info"><div class="cb-title">APA referencing</div><div class="cb-sub">Class 1</div></div>
    </button>
    <button class="class-btn" onclick="go('w5c2')" id="btn-w5c2">
      <div class="cb-dot" id="dot-w5c2"></div>
      <div class="cb-info"><div class="cb-title">Final feedback session</div><div class="cb-sub">Class 2</div></div>
    </button>
  </div>
</nav>

<main class="main" id="main-content">
  </main>

</div>

<script>
const COOKIE_KEY = 'm4classes_v1';
let state = {};

function saveCookie(val){
  try{document.cookie=COOKIE_KEY+'='+encodeURIComponent(JSON.stringify(val))+';max-age='+60*60*24*365+';path=/;SameSite=Lax'}catch(e){}
}
function loadCookie(){
  try{
    const m=document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith(COOKIE_KEY+'='));
    if(m)return JSON.parse(decodeURIComponent(m.split('=').slice(1).join('=')));
  }catch(e){}
  return {};
}

let currentClass = 'w1c1';

const classes = {

w1c1: {
  week: 'Week 1 · Class 1',
  title: 'Making a research question',
  desc: 'A good research question is the backbone of your entire report. This class introduces the 6W method and the Big 6 research framework to help you build a focused, answerable question.',
  render: renderW1C1
},
w1c2: {
  week: 'Week 1 · Class 2',
  title: 'Information literacy',
  desc: 'Not all sources are equal. This class teaches you how to evaluate sources critically, understand bias, and know when to use primary vs secondary research.',
  render: renderW1C2
},
w2c1: {
  week: 'Week 2 · Class 1',
  title: 'Logical fallacies & AI for research',
  desc: 'Clear thinking is a research skill. This class covers the most common logical errors students make, and how to use AI tools responsibly without compromising your academic integrity.',
  render: renderW2C1
},
w2c2: {
  week: 'Week 2 · Class 2',
  title: 'How to design and conduct an interview',
  desc: 'Your semi-structured interviews are a core part of this assignment. This class gives you the tools to design strong questions and conduct professional interviews.',
  render: renderW2C2
},
w3c1: {
  week: 'Week 3 · Class 1',
  title: 'Quantitative data types',
  desc: 'Understanding the type of data you are working with determines what you can do with it. This class introduces the four levels of measurement and why they matter for your market analysis.',
  render: renderW3C1
},
w3c2: {
  week: 'Week 3 · Class 2',
  title: 'Finding data, making graphs & market analysis',
  desc: 'Where to find reliable quantitative data, what makes a graph actually good, and how to turn numbers into a compelling market analysis section in your report.',
  render: renderW3C2
},
w4c1: {
  week: 'Week 4 · Class 1',
  title: 'Coding interviews — open coding, axial coding & the matrix',
  desc: 'Raw interview transcripts are not analysis. This class teaches you how to transform what your interviewees said into structured, usable insights — and how to use AI to support (not replace) that process.',
  render: renderW4C1
},
w4c2: {
  week: 'Week 4 · Class 2',
  title: 'Writing session & getting AI feedback',
  desc: 'Dedicated writing time. You will also learn how to use AI as a critical feedback tool — and crucially, how to prompt it using the actual grading rubric so the feedback is genuinely useful.',
  render: renderW4C2
},
w5c1: {
  week: 'Week 5 · Class 1',
  title: 'APA referencing — in-text, reference list & figures',
  desc: 'Referencing is a conditional criterion — errors here can fail your report. This class covers every reference type you will need, with special attention to how to cite figures correctly, and how to use the source list you have been building since week 2.',
  render: renderW5C1
},
w5c2: {
  week: 'Week 5 · Class 2',
  title: 'Final feedback & writing session',
  desc: 'Your last structured opportunity to get feedback before submission. This class is about finishing strong — tightening your argument, fixing common errors, and making sure every criterion is covered.',
  render: renderW5C2
}

};

function go(id) {
  currentClass = id;
  document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-'+id);
  if(btn) btn.classList.add('active');
  const cls = classes[id];
  const main = document.getElementById('main-content');

  // calc overall progress
  const taskIds = Object.keys(state).filter(k => state[k] === true);
  const allTasks = document.querySelectorAll('.ck').length;

  main.innerHTML = `
    <div class="class-header">
      <div class="class-week-tag">${cls.week}</div>
      <div class="class-title">${cls.title}</div>
      <div class="class-desc">${cls.desc}</div>
    </div>
    <div id="class-body"></div>
    <div class="nav-row">
      ${prevClass(id) ? `<button class="btn" onclick="go('${prevClass(id)}')">← Previous class</button>` : '<span></span>'}
      ${nextClass(id) ? `<button class="btn btn-dark" onclick="go('${nextClass(id)}')">Next class →</button>` : '<span style="font-size:13px;color:#888">You have reached the last class</span>'}
    </div>
  `;
  cls.render(document.getElementById('class-body'));
  restoreChecks();
  window.scrollTo(0,0);
}

const classOrder = ['w1c1','w1c2','w2c1','w2c2','w3c1','w3c2','w4c1','w4c2','w5c1','w5c2'];
function nextClass(id){ const i=classOrder.indexOf(id); return i<classOrder.length-1?classOrder[i+1]:null; }
function prevClass(id){ const i=classOrder.indexOf(id); return i>0?classOrder[i-1]:null; }

function ck(id, label) {
  return `<li class="check-item"><div class="ck" id="ck-${id}" onclick="tick('ck-${id}')">${state['ck-'+id]?'✓':''}</div><span class="ck-text ${state['ck-'+id]?'done':''}">${label}</span></li>`;
}

function tick(id) {
  const el = document.getElementById(id);
  if(!el) return;
  const done = !el.classList.contains('done');
  el.classList.toggle('done', done);
  el.textContent = done ? '✓' : '';
  const txt = el.nextElementSibling;
  if(txt) txt.classList.toggle('done', done);
  state[id] = done;
  saveCookie(state);
  updateDots();
}

function restoreChecks() {
  Object.keys(state).forEach(k => {
    if(!state[k]) return;
    const el = document.getElementById(k);
    if(!el) return;
    el.classList.add('done');
    el.textContent = '✓';
    const txt = el.nextElementSibling;
    if(txt) txt.classList.add('done');
  });
  updateDots();
}

function updateDots() {
  classOrder.forEach(cls => {
    const dot = document.getElementById('dot-'+cls);
    if(!dot) return;
    const relevant = Object.keys(state).filter(k => (k.includes(cls) || k.startsWith('ck-'+cls)) && state[k]);
    if(relevant.length > 0) dot.classList.add('done');
  });
}

// ─── W1C1 ────────────────────────────────────────────────────────
function renderW1C1(el) {
  el.innerHTML = `
  <div class="section">
    <div class="section-title"><span class="section-icon icon-learn">?</span>What is the Big 6 research method?</div>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="concept-term">1. Task definition</div>
        <div class="concept-def">Define the information problem and identify exactly what you need to know.</div>
        <div class="concept-example">What do I actually need to find out about my hotel's destination?</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">2. Information seeking strategies</div>
        <div class="concept-def">Decide which sources will best answer your question and in what order.</div>
        <div class="concept-example">Will I start with books, databases, interviews, or statistics?</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">3. Location & access</div>
        <div class="concept-def">Find and retrieve the information from those sources.</div>
        <div class="concept-example">Which library database, which website, which contact person?</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">4. Use of information</div>
        <div class="concept-def">Engage with the source — read, extract, note what is relevant.</div>
        <div class="concept-example">What does this source actually tell me that I can use?</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">5. Synthesis</div>
        <div class="concept-def">Organise and present the information — connect different sources into a coherent story.</div>
        <div class="concept-example">How do my sources support or contradict each other?</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">6. Evaluation</div>
        <div class="concept-def">Assess the process and the product — was this the best way? Is the outcome sufficient?</div>
        <div class="concept-example">Did I answer my research question? What would I do differently?</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-tool">6W</span>Build your research question — the 6W method</div>
    <p style="font-size:13px;color:#666;margin-bottom:14px;line-height:1.6">Answer each W question for your specific hotel and destination. Your answers will combine into a draft research question at the bottom.</p>
    <div class="w6-grid">
      <div class="w-field">
        <label>Who — who is this report for?</label>
        <div class="w-hint">Think about your reader. Who will use this information?</div>
        <input type="text" id="w6-who" placeholder="e.g. future HMSM students considering an internship at…" oninput="buildRQ()">
      </div>
      <div class="w-field">
        <label>What — what is the subject?</label>
        <div class="w-hint">What specific aspect of the hotel/destination are you researching?</div>
        <input type="text" id="w6-what" placeholder="e.g. the cultural characteristics, market position, and SDG practices of…" oninput="buildRQ()">
      </div>
      <div class="w-field">
        <label>Where — where is the focus?</label>
        <div class="w-hint">Name the destination and/or hotel.</div>
        <input type="text" id="w6-where" placeholder="e.g. [Hotel name] in [City, Country]" oninput="buildRQ()">
      </div>
      <div class="w-field">
        <label>When — what time period?</label>
        <div class="w-hint">Are you looking at current data? Recent years?</div>
        <input type="text" id="w6-when" placeholder="e.g. in the period 2022–2025" oninput="buildRQ()">
      </div>
      <div class="w-field">
        <label>Why — why is this relevant?</label>
        <div class="w-hint">Why does this information matter to your reader?</div>
        <input type="text" id="w6-why" placeholder="e.g. to prepare for an international hospitality internship" oninput="buildRQ()">
      </div>
      <div class="w-field">
        <label>How — how will you research it?</label>
        <div class="w-hint">What methods will you use? Literature, interviews, statistics?</div>
        <input type="text" id="w6-how" placeholder="e.g. through literature review, expert interviews, and market data" oninput="buildRQ()">
      </div>
    </div>

    <div class="ib-label">Your draft research question</div>
    <div class="rq-output" id="rq-preview"><span class="rq-placeholder">Fill in the fields above and your research question will appear here…</span></div>

    <div class="ib-label" style="margin-top:14px">Refine and finalise your research question</div>
    <p style="font-size:12px;color:#888;margin-bottom:8px">Edit the draft above into one clean, focused research question. A good research question is specific, researchable, and relevant to your reader.</p>
    <textarea id="rq-final" placeholder="Type your final research question here…" rows="3" oninput="saveRQ()"></textarea>
    <div class="saved-rq" id="rq-saved"></div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-green" onclick="saveRQBtn()">Save my research question</button>
      <span class="save-note" id="rq-save-note"></span>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-warn">!</span>What makes a research question good?</div>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="concept-term" style="color:#085041">Good research question</div>
        <div class="concept-def">Specific, focused, answerable with your chosen methods, relevant to the assignment.</div>
        <div class="concept-example">"What are the main cultural characteristics of [country] that a future intern at [hotel] should be aware of, and how are these reflected in the hotel's corporate culture?"</div>
      </div>
      <div class="concept-card">
        <div class="concept-term" style="color:#791F1F">Too broad</div>
        <div class="concept-def">Cannot be answered within a 3,000 word report. Tries to cover everything.</div>
        <div class="concept-example">"What is culture?"</div>
      </div>
      <div class="concept-card">
        <div class="concept-term" style="color:#791F1F">Yes/no question</div>
        <div class="concept-def">Can be answered without analysis or insight. Produces no useful discussion.</div>
        <div class="concept-example">"Does [hotel] have a corporate culture?"</div>
      </div>
      <div class="concept-card">
        <div class="concept-term" style="color:#633806">Too narrow</div>
        <div class="concept-def">Only a tiny part of the full assignment. Leaves most topics unaddressed.</div>
        <div class="concept-example">"What is the star rating of [hotel]?"</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-do">✓</span>Class checklist</div>
    <ul class="checklist">
      ${ck('w1c1-1','I understand the 6 steps of the Big 6 research method')}
      ${ck('w1c1-2','I have answered all 6W questions for my hotel and destination')}
      ${ck('w1c1-3','I have written and saved a draft research question')}
      ${ck('w1c1-4','I can explain what makes a research question too broad, too narrow, or a yes/no question')}
    </ul>
  </div>
  `;

  const saved = state['w1c1-rq-fields'];
  if(saved) {
    ['who','what','where','when','why','how'].forEach(w => {
      const el = document.getElementById('w6-'+w);
      if(el && saved[w]) { el.value = saved[w]; }
    });
    buildRQ();
  }
  const savedFinal = state['w1c1-rq-final'];
  if(savedFinal) {
    const el = document.getElementById('rq-final');
    if(el) el.value = savedFinal;
    showSavedRQ(savedFinal);
  }
}

function buildRQ() {
  const who = document.getElementById('w6-who')?.value.trim();
  const what = document.getElementById('w6-what')?.value.trim();
  const where = document.getElementById('w6-where')?.value.trim();
  const when = document.getElementById('w6-when')?.value.trim();
  const why = document.getElementById('w6-why')?.value.trim();
  const how = document.getElementById('w6-how')?.value.trim();

  const fields = {who,what,where,when,why,how};
  state['w1c1-rq-fields'] = fields;
  saveCookie(state);

  const hasAny = Object.values(fields).some(v => v);
  const preview = document.getElementById('rq-preview');
  if(!preview) return;
  if(!hasAny) {
    preview.innerHTML = '<span class="rq-placeholder">Fill in the fields above and your research question will appear here…</span>';
    return;
  }

  const w = what || '[what]';
  const wh = where || '[where]';
  const wn = when ? ' ' + when : '';
  const wy = why ? ', ' + why : '';
  const hw = how ? ' — explored ' + how : '';
  const forWho = who ? `For ${who}: ` : '';
  preview.innerHTML = `${forWho}What are ${w} at ${wh}${wn}${wy}?${hw}`;
}

function saveRQ() {
  const val = document.getElementById('rq-final')?.value;
  state['w1c1-rq-final'] = val;
  saveCookie(state);
}

function saveRQBtn() {
  const val = document.getElementById('rq-final')?.value.trim();
  if(!val) return;
  state['w1c1-rq-final'] = val;
  saveCookie(state);
  showSavedRQ(val);
  const note = document.getElementById('rq-save-note');
  if(note) { note.textContent = 'Saved!'; setTimeout(()=>note.textContent='',2000); }
  document.getElementById('dot-w1c1')?.classList.add('done');
}

function showSavedRQ(val) {
  const el = document.getElementById('rq-saved');
  if(!el) return;
  el.style.display = 'block';
  el.innerHTML = '<strong>Your saved research question:</strong><br>' + val;
}

let biasAnswered = [];
const biasScenarios = [
  { text: 'A hotel chain publishes a report on its own website titled "Why [Country] is the Best Destination for International Interns — Our Hotel Leads the Way."', options: ['No bias — it is a professional document','Confirmation bias','Selection bias','Anchoring bias'], correct: 1, feedback: 'Correct. A company publishing positive information about itself is promotional/confirmation bias.' }
];

function renderBiasQuiz() {
  const container = document.getElementById('bias-quiz');
  if(!container) return;
  biasScenarios.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'bias-scenario';
    div.innerHTML = `<div class="bias-text"><strong>Scenario ${i+1}:</strong> ${s.text}</div> <div class="bias-options">${s.options.map((o,j) => `<button class="bias-opt" onclick="answerBias(${i},${j})" id="bias-${i}-${j}">${o}</button>`).join('')}</div> <div class="bias-feedback" id="bias-fb-${i}"></div>`;
    container.appendChild(div);
  });
}

function answerBias(scenario, choice) {
  if(biasAnswered.includes(scenario)) return;
  biasAnswered.push(scenario);
  const s = biasScenarios[scenario];
  const correct = choice === s.correct;
  for(let j=0;j<s.options.length;j++){
    const btn = document.getElementById(`bias-${scenario}-${j}`);
    if(btn) btn.disabled = true;
    if(j === s.correct) btn?.classList.add('correct');
    else if(j === choice && !correct) btn?.classList.add('wrong');
  }
  const fb = document.getElementById(`bias-fb-${scenario}`);
  if(fb) { fb.classList.add('show', correct ? 'bf-correct' : 'bf-wrong'); fb.textContent = (correct ? 'Correct. ' : 'Not quite. ') + s.feedback; }
}

function copyCodingPrompt() {
  const el = document.getElementById('coding-prompt');
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).catch(()=>{});
  const btn = el.previousElementSibling.querySelector('button');
  if(btn){const o=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=o,1500);}
}
