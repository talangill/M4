<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M4 Go Explore — Class Companion</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Lexend:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0}

:root{
  /* — Base: crisp white canvas, deep ink text — */
  --cream:#F0F4FF;
  --warm-white:#FFFFFF;
  --border:#D0D8F0;
  --border-soft:#E2E8F8;
  --text:#0D0F2B;
  --text-soft:#3A3D6B;
  --text-muted:#7A7FA8;

  /* Electric teal — discovery, action */
  --teal:#00B8A9;
  --teal-light:#E0FAF8;
  --teal-mid:#6DDDD6;

  /* Solar amber — curiosity, warmth */
  --amber:#F59E0B;
  --amber-light:#FFFBEB;
  --amber-mid:#FCD34D;

  /* Alert red */
  --red:#E03E3E;
  --red-light:#FEF0F0;
  --red-mid:#F9A8A8;

  /* Vivid cobalt — depth, intellect */
  --blue:#3B62F7;
  --blue-light:#EEF2FF;
  --blue-mid:#93AFFE;

  /* Electric violet — imagination */
  --purple:#8B3DFF;
  --purple-light:#F3EEFF;
  --purple-mid:#C9A8FF;

  --coral:#F0522B;
  --coral-light:#FEF0EC;

  /* Week colours — each a distinct vivid world */
  --w1:#3B62F7; --w1-light:#EEF2FF;
  --w2:#00B8A9; --w2-light:#E0FAF8;
  --w3:#F59E0B; --w3-light:#FFFBEB;
  --w4:#8B3DFF; --w4-light:#F3EEFF;
  --w5:#E03E3E; --w5-light:#FEF0F0;
}

body{
  font-family:'Atkinson Hyperlegible',system-ui,sans-serif;
  color:var(--text);
  background:#F0F4FF;
  background-image:
    radial-gradient(ellipse at 10% 0%, rgba(59,98,247,0.10) 0%, transparent 55%),
    radial-gradient(ellipse at 90% 100%, rgba(139,61,255,0.08) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(0,184,169,0.05) 0%, transparent 70%);
  min-height:100vh;
  font-size:16px;
  line-height:1.8;
}

h1,h2,h3,.section-title,.class-title,.cb-title,.concept-term,.week-label,.sk-title{
  font-family:'Lexend',system-ui,sans-serif;
}

/* ── LAYOUT ───────────────────────────────── */
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}

/* ── SIDEBAR ──────────────────────────────── */
.sidebar{
  background:linear-gradient(180deg, #0D0F2B 0%, #141840 100%);
  border-right:2px solid rgba(59,98,247,0.2);
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.sidebar-header{
  padding:24px 18px 16px;
  border-bottom:1px solid rgba(59,98,247,0.25);
  background:transparent;
}
.sidebar-title{
  font-family:'Lexend',sans-serif;
  font-size:16px;font-weight:700;
  color:#fff;
  letter-spacing:-0.3px;
}
.sidebar-sub{font-size:12px;color:#A090D0;margin-top:3px}

.week-group{border-bottom:1px solid rgba(255,255,255,0.07)}
.week-label{
  padding:14px 18px 6px;
  font-size:10px;font-weight:700;
  color:rgba(255,255,255,0.35);
  text-transform:uppercase;letter-spacing:1.2px;
}

.class-btn{
  display:flex;align-items:center;gap:12px;
  width:100%;padding:10px 18px;
  border:none;background:none;text-align:left;
  cursor:pointer;font-family:inherit;
  transition:all 0.18s;
  border-left:3px solid transparent;
}
.class-btn:hover{background:rgba(255,255,255,0.06);border-left-color:rgba(255,255,255,0.2)}
.class-btn.active{background:rgba(59,98,247,0.2);border-left-color:var(--blue)}

.cb-dot{
  width:10px;height:10px;border-radius:50%;
  background:rgba(255,255,255,0.2);flex-shrink:0;
  transition:all 0.25s;border:2px solid transparent;
}
.cb-dot.done{background:var(--teal);border-color:var(--teal)}
.class-btn.active .cb-dot{border-color:var(--blue)}

.cb-info{flex:1;min-width:0}
.cb-title{font-family:'Lexend',sans-serif;font-size:12px;font-weight:600;color:rgba(255,255,255,0.85);line-height:1.35}
.cb-sub{font-size:11px;color:rgba(255,255,255,0.4);margin-top:2px}

/* Week colour accent on active buttons */
.wk1.active{border-left-color:var(--w1);background:rgba(59,98,247,0.18)}
.wk2.active{border-left-color:var(--w2);background:rgba(0,184,169,0.18)}
.wk3.active{border-left-color:var(--w3);background:rgba(245,158,11,0.18)}
.wk4.active{border-left-color:var(--w4);background:rgba(139,61,255,0.18)}
.wk5.active{border-left-color:var(--w5);background:rgba(224,62,62,0.18)}

/* ── MAIN CONTENT ─────────────────────────── */
.main{padding:36px 40px 60px;max-width:900px}

/* ── CLASS HEADER ─────────────────────────── */
.class-header{margin-bottom:32px}
.class-week-tag{
  display:inline-block;
  font-family:'Lexend',sans-serif;
  font-size:11px;font-weight:700;
  text-transform:uppercase;letter-spacing:1.2px;
  padding:4px 12px;border-radius:20px;
  margin-bottom:12px;
}
.tag-w1{background:var(--w1-light);color:var(--w1)}
.tag-w2{background:var(--w2-light);color:var(--w2)}
.tag-w3{background:var(--w3-light);color:var(--w3)}
.tag-w4{background:var(--w4-light);color:var(--w4)}
.tag-w5{background:var(--w5-light);color:var(--w5)}

.class-title{
  font-size:28px;font-weight:700;
  color:var(--text);line-height:1.2;
  margin-bottom:10px;letter-spacing:-0.5px;
}
.class-desc{
  font-size:16px;color:var(--text-soft);
  line-height:1.75;
  max-width:680px;
  padding:14px 18px;
  background:var(--warm-white);
  border-radius:12px;
  border-left:4px solid var(--blue-mid);
}

/* ── SECTIONS ─────────────────────────────── */
.section{
  background:var(--warm-white);
  border:2px solid var(--border);
  border-radius:16px;
  padding:24px;
  margin-bottom:20px;
  transition:border-color 0.2s;
}
.section:hover{border-color:var(--blue-mid)}

.section-title{
  font-size:15px;font-weight:700;
  color:var(--text);
  margin-bottom:16px;
  display:flex;align-items:center;gap:10px;
  line-height:1.3;
}
.section-icon{
  width:28px;height:28px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;flex-shrink:0;font-weight:700;
}
.icon-learn{background:var(--blue-light);color:var(--blue)}
.icon-do{background:var(--teal-light);color:var(--teal)}
.icon-warn{background:var(--amber-light);color:var(--amber)}
.icon-tool{background:var(--purple-light);color:var(--purple)}

/* ── CONCEPT CARDS ────────────────────────── */
.concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:640px){.concept-grid{grid-template-columns:1fr}}

.concept-card{
  background:var(--cream);
  border-radius:12px;padding:16px;
  border:2px solid var(--border-soft);
  transition:border-color 0.18s,transform 0.18s;
}
.concept-card:hover{border-color:var(--teal-mid);transform:translateY(-1px)}

.concept-term{
  font-family:'Lexend',sans-serif;
  font-size:13px;font-weight:700;
  color:var(--text);margin-bottom:6px;
}
.concept-def{font-size:14px;color:var(--text-soft);line-height:1.7}
.concept-example{
  font-size:13px;color:var(--text-muted);
  margin-top:8px;line-height:1.6;
  padding:8px 10px;
  background:var(--warm-white);
  border-radius:8px;
  border-left:3px solid var(--teal-mid);
  font-style:italic;
}

/* ── ALERTS ───────────────────────────────── */
.alert{
  border-radius:12px;
  padding:14px 16px;
  font-size:15px;
  line-height:1.7;
  margin-bottom:14px;
  border-left:5px solid transparent;
}
.alert strong{font-family:'Lexend',sans-serif;font-weight:700}
.alert-warn{background:var(--amber-light);border-left-color:var(--amber);color:#6B3A05}
.alert-info{background:var(--teal-light);border-left-color:var(--teal);color:#064E37}
.alert-red{background:var(--red-light);border-left-color:var(--red);color:#7A1F1A}

/* ── CHECKLIST ────────────────────────────── */
.checklist{list-style:none}
.check-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:10px 0;
  border-bottom:1px solid var(--border-soft);
  font-size:15px;line-height:1.65;
  transition:background 0.12s;
}
.check-item:last-child{border-bottom:none}
.check-item:hover{background:var(--cream);margin:0 -8px;padding:10px 8px;border-radius:8px}

.ck{
  width:22px;height:22px;
  border:2px solid var(--border);
  border-radius:6px;
  cursor:pointer;flex-shrink:0;margin-top:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:white;
  background:var(--warm-white);
  transition:all 0.18s;
}
.ck.done{background:var(--teal);border-color:var(--teal);transform:scale(1.1)}
.ck:hover:not(.done){border-color:var(--teal);background:var(--teal-light)}
.ck-text{color:var(--text)}
.ck-text.done{text-decoration:line-through;color:var(--text-muted)}

/* ── BUTTONS ──────────────────────────────── */
.btn{
  font-family:'Lexend',sans-serif;
  font-size:13px;font-weight:600;
  padding:8px 18px;border-radius:8px;
  border:2px solid var(--border);
  cursor:pointer;background:var(--warm-white);
  color:var(--text-soft);
  transition:all 0.18s;
  letter-spacing:-0.1px;
}
.btn:hover{background:var(--cream);border-color:#aaa;color:var(--text)}
.btn-dark{background:linear-gradient(135deg, #1A1630 0%, #2A1F4E 100%);color:#fff;border-color:#1A1630}
.btn-dark:hover{background:linear-gradient(135deg, #251A45 0%, #351A6A 100%);border-color:#251A45}
.btn-green{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-green:hover{background:#168a63;border-color:#168a63}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.save-note{font-size:13px;color:var(--teal);font-weight:600}

/* ── TABS ─────────────────────────────────── */
.data-type-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.dt-tab{
  font-family:'Lexend',sans-serif;
  padding:7px 16px;font-size:13px;font-weight:600;
  cursor:pointer;border:2px solid var(--border);
  border-radius:20px;background:var(--warm-white);
  color:var(--text-soft);transition:all 0.18s;
}
.dt-tab:hover{border-color:#aaa;color:var(--text)}
.dt-tab.active{background:linear-gradient(135deg, var(--blue) 0%, var(--purple) 100%);color:#fff;border-color:var(--blue)}
.dt-panel{display:none}.dt-panel.active{display:block}

/* ── TABLES ───────────────────────────────── */
.source-table{width:100%;border-collapse:collapse;font-size:14px}
.source-table th{
  text-align:left;padding:10px 12px;
  background:var(--cream);
  font-family:'Lexend',sans-serif;font-weight:700;
  color:var(--text-soft);
  border-bottom:2px solid var(--border);
  font-size:12px;text-transform:uppercase;letter-spacing:0.5px;
}
.source-table td{
  padding:10px 12px;border-bottom:1px solid var(--border-soft);
  color:var(--text-soft);vertical-align:top;line-height:1.65;
}
.source-table tr:last-child td{border-bottom:none}
.source-table tr:hover td{background:var(--cream)}
.good{color:var(--teal);font-weight:600}
.bad{color:var(--red);font-weight:600}
.mid{color:var(--amber);font-weight:600}

/* ── FALLACY CARDS ────────────────────────── */
.fallacy-card{
  border:2px solid var(--border);border-radius:12px;
  padding:14px 16px;margin-bottom:10px;
  cursor:pointer;transition:all 0.18s;
  background:var(--warm-white);
}
.fallacy-card:hover{border-color:var(--blue-mid);transform:translateY(-1px)}
.fallacy-card.open{border-color:var(--blue);background:var(--blue-light)}
.fallacy-name{
  font-family:'Lexend',sans-serif;
  font-size:14px;font-weight:700;
  color:var(--text);margin-bottom:3px;
  display:flex;justify-content:space-between;align-items:center;
}
.fallacy-name .expand-hint{
  font-size:11px;color:var(--text-muted);font-weight:400;
  padding:2px 8px;border-radius:12px;
  background:var(--blue-light);border:1px solid var(--blue-mid);
  font-family:'Atkinson Hyperlegible',sans-serif;
}
.fallacy-card.open .expand-hint{display:none}
.fallacy-short{font-size:13px;color:var(--text-soft);line-height:1.5}
.fallacy-body{display:none;margin-top:14px;padding-top:14px;border-top:2px solid var(--border-soft)}
.fallacy-card.open .fallacy-body{display:block}
.fallacy-def{font-size:14px;color:var(--text);line-height:1.7;margin-bottom:10px}
.fallacy-ex{
  font-size:13px;color:var(--text-soft);
  padding:12px 14px;
  background:var(--warm-white);border-radius:10px;
  border-left:4px solid var(--amber);line-height:1.65;
}

/* ── BIAS QUIZ ────────────────────────────── */
.bias-scenario{
  background:var(--cream);border-radius:14px;
  padding:18px;margin-bottom:14px;
  border:2px solid var(--border-soft);
}
.bias-text{font-size:15px;line-height:1.75;margin-bottom:14px;color:var(--text)}
.bias-options{display:flex;flex-direction:column;gap:8px}
.bias-opt{
  padding:12px 16px;border-radius:10px;
  border:2px solid var(--border);
  cursor:pointer;font-size:14px;
  background:var(--warm-white);
  font-family:inherit;text-align:left;
  transition:all 0.18s;color:var(--text);
}
.bias-opt:hover{border-color:#aaa;background:var(--warm-white);transform:translateX(2px)}
.bias-opt.correct{background:var(--teal-light);border-color:var(--teal);color:#064E37}
.bias-opt.wrong{background:var(--red-light);border-color:var(--red);color:#7A1F1A}
.bias-feedback{display:none;font-size:14px;margin-top:12px;padding:12px 14px;border-radius:10px;line-height:1.65}
.bias-feedback.show{display:block}
.bf-correct{background:var(--teal-light);color:#064E37;border-left:4px solid var(--teal)}
.bf-wrong{background:var(--red-light);color:#7A1F1A;border-left:4px solid var(--red)}

/* ── NAV ROW ──────────────────────────────── */
.nav-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:32px;padding-top:24px;
  border-top:2px solid var(--border-soft);
}

/* ── FORMS ────────────────────────────────── */
textarea,input[type=text]{
  width:100%;
  font-family:'Atkinson Hyperlegible',sans-serif;
  font-size:15px;color:var(--text);
  background:var(--warm-white);
  border:2px solid var(--border);border-radius:10px;
  padding:12px 14px;outline:none;
  transition:border-color 0.18s;
  line-height:1.7;
}
textarea{resize:vertical;min-height:80px}
textarea:focus,input[type=text]:focus{border-color:var(--teal)}

.w6-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
@media(max-width:560px){.w6-grid{grid-template-columns:1fr}}
.w-field{display:flex;flex-direction:column;gap:5px}
.w-field label{font-family:'Lexend',sans-serif;font-size:13px;font-weight:700;color:var(--text)}
.w-field .w-hint{font-size:13px;color:var(--text-muted)}

/* ── RESEARCH QUESTION ────────────────────── */
.rq-output{
  background:var(--teal-light);
  border:2px solid var(--teal-mid);
  border-radius:12px;padding:16px;
  min-height:60px;font-size:16px;line-height:1.75;
  color:var(--text);margin-bottom:14px;
  font-style:italic;
}
.rq-placeholder{color:var(--text-muted);font-style:normal;font-size:14px}
.saved-rq{
  background:var(--teal-light);border:2px solid var(--teal-mid);
  border-radius:12px;padding:14px;
  font-size:14px;color:#064E37;
  margin-top:12px;display:none;line-height:1.7;
}

/* ── AI DO/DONT ───────────────────────────── */
.ai-do-dont{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.ai-do-dont{grid-template-columns:1fr}}
.ai-col{border-radius:12px;padding:16px;border:2px solid transparent}
.ai-do{background:var(--teal-light);border-color:var(--teal-mid)}
.ai-dont{background:var(--red-light);border-color:var(--red-mid)}
.ai-col-title{
  font-family:'Lexend',sans-serif;
  font-size:13px;font-weight:700;margin-bottom:10px;
}
.ai-do .ai-col-title{color:#064E37}
.ai-dont .ai-col-title{color:#7A1F1A}
.ai-list{list-style:none;font-size:14px;line-height:1.6}
.ai-list li{
  padding:5px 0;
  border-bottom:1px solid rgba(0,0,0,0.07);
  display:flex;gap:8px;align-items:flex-start;
}
.ai-list li::before{content:'';flex-shrink:0;margin-top:8px;width:6px;height:6px;border-radius:50%;display:block}
.ai-list li:last-child{border-bottom:none}
.ai-do .ai-list li{color:#064E37}
.ai-do .ai-list li::before{background:var(--teal)}
.ai-dont .ai-list li{color:#7A1F1A}
.ai-dont .ai-list li::before{background:var(--red)}

/* ── INTERVIEW BUILDER ────────────────────── */
.interview-builder{display:flex;flex-direction:column;gap:12px}
.iq-row{display:flex;gap:10px;align-items:center}
.iq-num{
  font-family:'Lexend',sans-serif;
  font-size:14px;font-weight:700;color:var(--text-muted);
  width:24px;flex-shrink:0;text-align:center;
}
.iq-input{flex:1}
.iq-del{font-size:20px;color:var(--border);cursor:pointer;border:none;background:none;line-height:1;padding:0 4px;transition:color 0.15s}
.iq-del:hover{color:var(--red)}

/* ── INTERACTIVE BOX ──────────────────────── */
.interactive-box{
  background:var(--cream);border-radius:12px;
  padding:18px;border:2px solid var(--border-soft);
}
.ib-label{
  font-family:'Lexend',sans-serif;
  font-size:11px;font-weight:700;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;
}
.ib-question{font-size:16px;font-weight:500;color:var(--text);margin-bottom:10px;line-height:1.5}
.ib-hint{font-size:14px;color:var(--text-soft);margin-bottom:12px;line-height:1.65}

/* ── GRAPH GRID ───────────────────────────── */
.graph-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:580px){.graph-grid{grid-template-columns:1fr}}
.graph-card{
  border:2px solid var(--border-soft);border-radius:12px;
  padding:14px;background:var(--cream);
  transition:border-color 0.18s,transform 0.18s;
}
.graph-card:hover{border-color:#aaa;transform:translateY(-1px)}
.graph-name{font-family:'Lexend',sans-serif;font-size:14px;font-weight:700;margin-bottom:6px}
.graph-use{font-size:13px;color:var(--text-soft);margin-bottom:6px;line-height:1.5}
.graph-ok{font-size:13px;color:var(--teal);font-weight:600;padding-left:10px;border-left:3px solid var(--teal);margin-bottom:4px}
.graph-not{font-size:13px;color:var(--red);font-weight:600;padding-left:10px;border-left:3px solid var(--red)}

/* ── CODING PROMPT ────────────────────────── */
pre{
  white-space:pre-wrap;font-family:'Atkinson Hyperlegible',monospace;
  font-size:13px;line-height:1.7;color:var(--text-soft);
  background:var(--warm-white);margin:0;padding:14px 16px;
}

/* ── PROGRESS BAR ─────────────────────────── */
.pm-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;flex:1}
.pm-fill{height:100%;background:var(--teal);border-radius:3px;transition:width 0.4s}
.pm-text{font-size:13px;color:var(--text-muted)}

/* ── MOBILE ───────────────────────────────── */
@media(max-width:720px){
  .app{grid-template-columns:1fr}
  .sidebar{position:relative;height:auto;border-right:none;border-bottom:2px solid var(--border)}
  .main{padding:20px 18px 40px}
  .class-title{font-size:22px}
}

/* ── APA TYPE BUTTONS ─────────────────────── */
.apa-type-btn{
  font-family:'Lexend',sans-serif;
  font-size:12px;font-weight:600;
  padding:7px 14px;border-radius:20px;
  border:2px solid var(--border);
  background:var(--warm-white);color:var(--text-soft);
  cursor:pointer;transition:all 0.18s;
}
.apa-type-btn:hover{border-color:#aaa;color:var(--text)}
</style>
</head>
<body>
<div class="app">

<nav class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-title">M4 Go Explore</div>
    <div class="sidebar-sub">Class companion · 2025–2026</div>
  </div>

  <div style="padding:10px 12px;border-bottom:2px solid var(--border-soft)">
    <button class="class-btn active" id="btn-dashboard" onclick="go('dashboard')"

<script>
const COOKIE_KEY = 'm4classes_v1';
let state = {};

function saveCookie(val){
  try{document.cookie=COOKIE_KEY+'='+encodeURIComponent(JSON.stringify(val))+';max-age='+60*60*24*365+';path=/;SameSite=Lax'}catch(e){}
}
function loadCookie(){
  try{
    const m=document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith(COOKIE_KEY+'='));
    if(m)return JSON.parse(decodeURIComponent(m.split('=').slice(1).join('=')));
  }catch(e){}
  return {};
}

let currentClass = 'w1c1';

const classes = {

w1c1: {
  week: 'Week 1 · Class 1',
  title: 'Making a research question',
  desc: 'A good research question is the backbone of your entire report. This class introduces the 6W method and the Big 6 research framework to help you build a focused, answerable question.',
  render: renderW1C1
},
w1c2: {
  week: 'Week 1 · Class 2',
  title: 'Information literacy & APA introduction',
  desc: 'Not all sources are equal. This class teaches you how to evaluate sources critically using the CROP method, understand bias, and know when to use primary vs secondary research. It also introduces APA referencing — you will start tracking sources today.',
  render: renderW1C2
},
w2c1: {
  week: 'Week 2 · Class 1',
  title: 'Logical fallacies & AI for research',
  desc: 'Clear thinking is a research skill. This class covers the most common logical errors students make, and how to use AI tools responsibly without compromising your academic integrity.',
  render: renderW2C1
},
w2c2: {
  week: 'Week 2 · Class 2',
  title: 'How to design and conduct an interview',
  desc: 'Your semi-structured interviews are a core part of this assignment. This class gives you the tools to design strong questions and conduct professional interviews.',
  render: renderW2C2
},
w3c1: {
  week: 'Week 3 · Class 1',
  title: 'Quantitative data types',
  desc: 'Understanding the type of data you are working with determines what you can do with it. This class introduces the four levels of measurement and why they matter for your market analysis.',
  render: renderW3C1
},
w3c2: {
  week: 'Week 3 · Class 2',
  title: 'Finding data, making graphs & market analysis',
  desc: 'Where to find reliable quantitative data, what makes a graph actually good, and how to turn numbers into a compelling market analysis section in your report.',
  render: renderW3C2
},
w4c1: {
  week: 'Week 4 · Class 1',
  title: 'Coding interviews — open coding, axial coding & the matrix',
  desc: 'Raw interview transcripts are not analysis. This class teaches you how to transform what your interviewees said into structured, usable insights — and how to use AI to support (not replace) that process.',
  render: renderW4C1
},
w4c2: {
  week: 'Week 4 · Class 2',
  title: 'Writing session & getting AI feedback',
  desc: 'Dedicated writing time. You will also learn how to use AI as a critical feedback tool — and crucially, how to prompt it using the actual grading rubric so the feedback is genuinely useful.',
  render: renderW4C2
},
w5c1: {
  week: 'Week 5 · Classes 1 & 2',
  title: 'Final writing session, APA check & defence prep',
  desc: 'Your last structured opportunity before submission. This session combines a full pre-submission checklist, an APA referencing check (first introduced in week 1), copy-ready AI feedback prompts, and defence preparation.',
  render: renderW5C1
}

};

const weekTagClass = {
  w1c1:'tag-w1',w1c2:'tag-w1',
  w2c1:'tag-w2',w2c2:'tag-w2',
  w3c1:'tag-w3',w3c2:'tag-w3',
  w4c1:'tag-w4',w4c2:'tag-w4',
  w5c1:'tag-w5'
};

function go(id) {
  currentClass = id;
  document.querySelectorAll('.class-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('btn-'+id);
  if(btn) btn.classList.add('active');
  const main = document.getElementById('main-content');

  if(id === 'dashboard') {
    main.innerHTML = '<div id="class-body"></div>';
    renderDashboard(document.getElementById('class-body'));
    restoreChecks();
    window.scrollTo(0,0);
    return;
  }

  const cls = classes[id];
  const tagClass = weekTagClass[id] || 'tag-w1';

  main.innerHTML = `
    <div style="margin-bottom:8px">
      <button onclick="go('dashboard')" style="font-family:'Lexend',sans-serif;font-size:12px;font-weight:600;color:var(--text-muted);background:none;border:none;cursor:pointer;padding:0;display:flex;align-items:center;gap:5px">← Dashboard</button>
    </div>
    <div class="class-header">
      <div class="class-week-tag ${tagClass}">${cls.week}</div>
      <div class="class-title">${cls.title}</div>
      <div class="class-desc">${cls.desc}</div>
    </div>
    <div id="class-body"></div>
    <div class="nav-row">
      ${prevClass(id) ? `<button class="btn btn-dark" onclick="go('${prevClass(id)}')">← Previous</button>` : '<span></span>'}
      ${nextClass(id) ? `<button class="btn btn-green" onclick="go('${nextClass(id)}')">Next class →</button>` : '<span style="font-size:14px;color:var(--teal);font-weight:600">You\'ve completed all classes! 🎉</span>'}
    </div>
  `;
  cls.render(document.getElementById('class-body'));
  restoreChecks();
  window.scrollTo(0,0);
}

const classOrder = ['w1c1','w1c2','w2c1','w2c2','w3c1','w3c2','w4c1','w4c2','w5c1'];
function nextClass(id){ const i=classOrder.indexOf(id); return i<classOrder.length-1?classOrder[i+1]:null; }
function prevClass(id){ const i=classOrder.indexOf(id); return i>0?classOrder[i-1]:null; }

function ck(id, label) {
  return `<li class="check-item"><div class="ck" id="ck-${id}" onclick="tick('ck-${id}')">${state['ck-'+id]?'✓':''}</div><span class="ck-text ${state['ck-'+id]?'done':''}">${label}</span></li>`;
}

function tick(id) {
  const el = document.getElementById(id);
  if(!el) return;
  const done = !el.classList.contains('done');
  el.classList.toggle('done', done);
  el.textContent = done ? '✓' : '';
  const txt = el.nextElementSibling;
  if(txt) txt.classList.toggle('done', done);
  state[id] = done;
  saveCookie(state);
  updateDots();
}

function restoreChecks() {
  Object.keys(state).forEach(k => {
    if(!state[k]) return;
    const el = document.getElementById(k);
    if(!el) return;
    el.classList.add('done');
    el.textContent = '✓';
    const txt = el.nextElementSibling;
    if(txt) txt.classList.add('done');
  });
  updateDots();
}

function updateDots() {
  // per-class dot: green if any task in that class is done
  classOrder.forEach(cls => {
    const dot = document.getElementById('dot-'+cls);
    if(!dot) return;
    // check if saved rq or any ck for this class
    const relevant = Object.keys(state).filter(k => (k.includes(cls) || k.startsWith('ck-'+cls)) && state[k]);
    if(relevant.length > 0) dot.classList.add('done');
  });
}

// ─── W1C1 ────────────────────────────────────────────────────────
function renderW1C1(el) {
  el.innerHTML = `
  <div class="section">
    <div class="section-title"><span class="section-icon icon-learn">?</span>What is the Big 6 research method?</div>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="concept-term">1. Task definition</div>
        <div class="concept-def">Define the information problem and identify exactly what you need to know.</div>
        <div class="concept-example">What do I actually need to find out about my hotel's destination?</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">2. Information seeking strategies</div>
        <div class="concept-def">Decide which sources will best answer your question and in what order.</div>
        <div class="concept-example">Will I start with books, databases, interviews, or statistics?</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">3. Location & access</div>
        <div class="concept-def">Find and retrieve the information from those sources.</div>
        <div class="concept-example">Which library database, which website, which contact person?</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">4. Use of information</div>
        <div class="concept-def">Engage with the source — read, extract, note what is relevant.</div>
        <div class="concept-example">What does this source actually tell me that I can use?</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">5. Synthesis</div>
        <div class="concept-def">Organise and present the information — connect different sources into a coherent story.</div>
        <div class="concept-example">How do my sources support or contradict each other?</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">6. Evaluation</div>
        <div class="concept-def">Assess the process and the product — was this the best way? Is the outcome sufficient?</div>
        <div class="concept-example">Did I answer my research question? What would I do differently?</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-tool">6W</span>Build your research question — the 6W method</div>
    <p style="font-size:13px;color:#666;margin-bottom:14px;line-height:1.6">Answer each W question for your specific hotel and destination. Your answers will combine into a draft research question at the bottom.</p>
    <div class="w6-grid">
      <div class="w-field">
        <label>Who — who is this report for?</label>
        <div class="w-hint">Think about your reader. Who will use this information?</div>
        <input type="text" id="w6-who" placeholder="e.g. future HMSM students considering an internship at…" oninput="buildRQ()">
      </div>
      <div class="w-field">
        <label>What — what is the subject?</label>
        <div class="w-hint">What specific aspect of the hotel/destination are you researching?</div>
        <input type="text" id="w6-what" placeholder="e.g. the cultural characteristics, market position, and SDG practices of…" oninput="buildRQ()">
      </div>
      <div class="w-field">
        <label>Where — where is the focus?</label>
        <div class="w-hint">Name the destination and/or hotel.</div>
        <input type="text" id="w6-where" placeholder="e.g. [Hotel name] in [City, Country]" oninput="buildRQ()">
      </div>
      <div class="w-field">
        <label>When — what time period?</label>
        <div class="w-hint">Are you looking at current data? Recent years?</div>
        <input type="text" id="w6-when" placeholder="e.g. in the period 2022–2025" oninput="buildRQ()">
      </div>
      <div class="w-field">
        <label>Why — why is this relevant?</label>
        <div class="w-hint">Why does this information matter to your reader?</div>
        <input type="text" id="w6-why" placeholder="e.g. to prepare for an international hospitality internship" oninput="buildRQ()">
      </div>
      <div class="w-field">
        <label>How — how will you research it?</label>
        <div class="w-hint">What methods will you use? Literature, interviews, statistics?</div>
        <input type="text" id="w6-how" placeholder="e.g. through literature review, expert interviews, and market data" oninput="buildRQ()">
      </div>
    </div>

    <div class="ib-label">Your draft research question</div>
    <div class="rq-output" id="rq-preview"><span class="rq-placeholder">Fill in the fields above and your research question will appear here…</span></div>

    <div class="ib-label" style="margin-top:14px">Refine and finalise your research question</div>
    <p style="font-size:12px;color:#888;margin-bottom:8px">Edit the draft above into one clean, focused research question. A good research question is specific, researchable, and relevant to your reader.</p>
    <textarea id="rq-final" placeholder="Type your final research question here…" rows="3" oninput="saveRQ()"></textarea>
    <div class="saved-rq" id="rq-saved"></div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-green" onclick="saveRQBtn()">Save my research question</button>
      <span class="save-note" id="rq-save-note"></span>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-warn">!</span>What makes a research question good?</div>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="concept-term" style="color:#085041">Good research question</div>
        <div class="concept-def">Specific, focused, answerable with your chosen methods, relevant to the assignment.</div>
        <div class="concept-example">"What are the main cultural characteristics of [country] that a future intern at [hotel] should be aware of, and how are these reflected in the hotel's corporate culture?"</div>
      </div>
      <div class="concept-card">
        <div class="concept-term" style="color:#791F1F">Too broad</div>
        <div class="concept-def">Cannot be answered within a 3,000 word report. Tries to cover everything.</div>
        <div class="concept-example">"What is culture?"</div>
      </div>
      <div class="concept-card">
        <div class="concept-term" style="color:#791F1F">Yes/no question</div>
        <div class="concept-def">Can be answered without analysis or insight. Produces no useful discussion.</div>
        <div class="concept-example">"Does [hotel] have a corporate culture?"</div>
      </div>
      <div class="concept-card">
        <div class="concept-term" style="color:#633806">Too narrow</div>
        <div class="concept-def">Only a tiny part of the full assignment. Leaves most topics unaddressed.</div>
        <div class="concept-example">"What is the star rating of [hotel]?"</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-do">✓</span>Class checklist</div>

  `;

  // restore saved values
  const saved = state['w1c1-rq-fields'];
  if(saved) {
    ['who','what','where','when','why','how'].forEach(w => {
      const el = document.getElementById('w6-'+w);
      if(el && saved[w]) { el.value = saved[w]; }
    });
    buildRQ();
  }
  const savedFinal = state['w1c1-rq-final'];
  if(savedFinal) {
    const el = document.getElementById('rq-final');
    if(el) el.value = savedFinal;
    showSavedRQ(savedFinal);
  }
}

function buildRQ() {
  const who = document.getElementById('w6-who')?.value.trim();
  const what = document.getElementById('w6-what')?.value.trim();
  const where = document.getElementById('w6-where')?.value.trim();
  const when = document.getElementById('w6-when')?.value.trim();
  const why = document.getElementById('w6-why')?.value.trim();
  const how = document.getElementById('w6-how')?.value.trim();

  const fields = {who,what,where,when,why,how};
  state['w1c1-rq-fields'] = fields;
  saveCookie(state);

  const hasAny = Object.values(fields).some(v => v);
  const preview = document.getElementById('rq-preview');
  if(!preview) return;
  if(!hasAny) {
    preview.innerHTML = '<span class="rq-placeholder">Fill in the fields above and your research question will appear here…</span>';
    return;
  }

  const w = what || '[what]';
  const wh = where || '[where]';
  const wn = when ? ' ' + when : '';
  const wy = why ? ', ' + why : '';
  const hw = how ? ' — explored ' + how : '';
  const forWho = who ? `For ${who}: ` : '';
  preview.innerHTML = `${forWho}What are ${w} at ${wh}${wn}${wy}?${hw}`;
}

function saveRQ() {
  const val = document.getElementById('rq-final')?.value;
  state['w1c1-rq-final'] = val;
  saveCookie(state);
}

function saveRQBtn() {
  const val = document.getElementById('rq-final')?.value.trim();
  if(!val) return;
  state['w1c1-rq-final'] = val;
  saveCookie(state);
  showSavedRQ(val);
  const note = document.getElementById('rq-save-note');
  if(note) { note.textContent = 'Saved!'; setTimeout(()=>note.textContent='',2000); }
  document.getElementById('dot-w1c1')?.classList.add('done');
}

function showSavedRQ(val) {
  const el = document.getElementById('rq-saved');
  if(!el) return;
  el.style.display = 'block';
  el.innerHTML = '<strong>Your saved research question:</strong><br>' + val;
}

// ─── W1C2 ────────────────────────────────────────────────────────
function renderW1C2(el) {

      <span style="font-size:22px">📚</span>

    <div class="section">

      <p style="font-size:15px;color:var(--text-soft);line-height:1.75;margin-bottom:14px">A credible source is <strong>free from bias and backed by evidence</strong>. The author is an expert in their field, and the information is published by a trustworthy organisation. Not every website or document you find qualifies.</p>

          <div class="concept-example"><span style="color:var(--teal);font-weight:700">✓ Good:</span> Within 5–7 years; market data within 2–3 years<br><span style="color:var(--red);font-weight:700">✗ Warning:</span> Pre-2015 for market data; no date visible</div>
        </div>
        <div class="concept-card" style="border-left:5px solid var(--w2)">

const APA_W1_COOKIE = 'm4_apa_refs_v1';
let apaW1Type = 'journal';
let apaW1Refs = [];

const apaW1Schema = {
  journal:{
    fields:[
      {id:'authors',label:'Author(s)',hint:'e.g. Hofstede, G., & Bond, M. H.',ph:'Smith, J. A., & Jones, B.'},
      {id:'year',label:'Year',hint:'Publication year',ph:'2023'},
      {id:'title',label:'Article title',hint:'Sentence case — only capitalise first word',ph:'The impact of culture on hotel management'},
      {id:'journal',label:'Journal name',hint:'Title Case — every major word capitalised',ph:'International Journal of Hospitality Management'},
      {id:'volume',label:'Volume',hint:'The bold number',ph:'45'},
      {id:'issue',label:'Issue',hint:'The number in brackets',ph:'3'},
      {id:'pages',label:'Pages',hint:'e.g. 112–128',ph:'112–128'},
      {id:'doi',label:'DOI or URL',hint:'Starts with https://doi.org/…',ph:'https://doi.org/10.xxxx/xxxxx'}
    ],
    ref(v){
      const a=v.authors||'Author, A. A.';
      const y=v.year?`(${v.year})`:'(n.d.)';
      const t=v.title||'Article title';
      const j=v.journal?`<em>${v.journal}</em>`:'<em>Journal Name</em>';
      const vol=v.volume?`, <em>${v.volume}</em>`:'';
      const iss=v.issue?`(${v.issue})`:'';
      const pg=v.pages?`, ${v.pages}`:'';
      const doi=v.doi?`. ${v.doi}`:'';
      return `${a}. ${y}. ${t}. ${j}${vol}${iss}${pg}${doi}.`;
    },
    intext(v){
      const auth = v.authors ? v.authors.split(',')[0].trim() : 'Author';
      const yr = v.year || 'n.d.';
      const mult = v.authors && v.authors.includes('&') ? ' et al.' : '';
      return `(${auth}${mult}, ${yr})`;
    }
  },
  book:{
    fields:[
      {id:'authors',label:'Author(s)',hint:'e.g. Hofstede, G., & Hofstede, G. J.',ph:'Hofstede, G.'},
      {id:'year',label:'Year',hint:'',ph:'2010'},
      {id:'title',label:'Book title',hint:'Sentence case — will be italicised',ph:'Cultures and organizations'},
      {id:'edition',label:'Edition',hint:'Leave blank if 1st edition',ph:'3rd ed.'},
      {id:'publisher',label:'Publisher',hint:'',ph:'McGraw-Hill'},
      {id:'doi',label:'DOI or URL',hint:'Only if ebook',ph:'https://…'}
    ],
    ref(v){
      const a=v.authors||'Author, A. A.';
      const y=v.year?`(${v.year})`:'(n.d.)';
      const t=v.title?`<em>${v.title}</em>`:'<em>Book title</em>';
      const ed=v.edition?` (${v.edition})`:'';
      const pub=v.publisher?`. ${v.publisher}`:'';
      const doi=v.doi?`. ${v.doi}`:'';
      return `${a}. ${y}. ${t}${ed}${pub}${doi}.`;
    },
    intext(v){
      const auth = v.authors ? v.authors.split(',')[0].trim() : 'Author';
      const yr = v.year || 'n.d.';
      return `(${auth}, ${yr})`;
    }
  },
  website:{
    fields:[
      {id:'authors',label:'Author or organisation',hint:'',ph:'World Tourism Organization'},
      {id:'year',label:'Year',hint:'Year published or last updated',ph:'2024'},
      {id:'title',label:'Page title',hint:'Sentence case — will be italicised',ph:'Tourism statistics 2024'},
      {id:'site',label:'Website name',hint:'If different from the author',ph:'UNWTO'},
      {id:'url',label:'URL',hint:'Full web address',ph:'https://www.unwto.org/…'}
    ],
    ref(v){
      const a=v.authors||'Author, A. A.';
      const y=v.year?`(${v.year})`:'(n.d.)';
      const t=v.title?`<em>${v.title}</em>`:'<em>Page title</em>';
      const site=v.site?`. ${v.site}`:'';
      const url=v.url?`. ${v.url}`:'';
      return `${a}. ${y}. ${t}${site}${url}.`;
    },
    intext(v){
      const auth = v.authors ? v.authors.split(',')[0].trim() : 'Author';
      const yr = v.year || 'n.d.';
      return `(${auth}, ${yr})`;
    }
  },
  report:{
    fields:[
      {id:'authors',label:'Author or organisation',hint:'',ph:'Statista Research Department'},
      {id:'year',label:'Year',hint:'',ph:'2024'},
      {id:'title',label:'Report or dataset title',hint:'Sentence case — will be italicised',ph:'Hotel occupancy rate in the Netherlands 2023'},
      {id:'publisher',label:'Publisher or platform',hint:'',ph:'Statista'},
      {id:'url',label:'URL',hint:'',ph:'https://www.statista.com/…'}
    ],
    ref(v){
      const a=v.authors||'Author, A. A.';
      const y=v.year?`(${v.year})`:'(n.d.)';
      const t=v.title?`<em>${v.title}</em>`:'<em>Report title</em>';
      const pub=v.publisher?`. ${v.publisher}`:'';
      const url=v.url?`. ${v.url}`:'';
      return `${a}. ${y}. ${t}${pub}${url}.`;
    },
    intext(v){
      const auth = v.authors ? v.authors.split(',')[0].trim() : 'Author';
      const yr = v.year || 'n.d.';
      return `(${auth}, ${yr})`;
    }
  }
};

function loadApaRefsW1(){
  try{
    const m=document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith(APA_W1_COOKIE+'='));
    if(m) return JSON.parse(decodeURIComponent(m.split('=').slice(1).join('=')));
  }catch(e){}
  return [];
}
function saveApaRefsCookieW1(){
  try{document.cookie=APA_W1_COOKIE+'='+encodeURIComponent(JSON.stringify(apaW1Refs))+';max-age='+60*60*24*365+';path=/;SameSite=Lax'}catch(e){}
}

function initApaW1(){
  apaW1Refs = loadApaRefsW1();
  setApaTypeW1('journal', document.querySelector('.apa-type-btn'));
}

function setApaTypeW1(type, btn){
  apaW1Type = type;
  document.querySelectorAll('.apa-type-btn').forEach(b=>{
    b.style.background='var(--warm-white)';
    b.style.borderColor='var(--border)';
    b.style.color='var(--text-soft)';
    b.style.fontWeight='600';
  });
  if(btn){
    btn.style.background='var(--w1-light)';
    btn.style.borderColor='var(--w1)';
    btn.style.color='var(--w1)';
  }
  const schema = apaW1Schema[type];
  const container = document.getElementById('apa-w1-fields');
  if(!container) return;
  container.innerHTML = '';
  schema.fields.forEach(f=>{
    const div = document.createElement('div');
    div.className = 'w-field';
    div.innerHTML = `<label>${f.label}</label>${f.hint?`<span class="w-hint">${f.hint}</span>`:''}<input type="text" id="apaw1_${f.id}" placeholder="${f.ph}" oninput="updateApaPreviewW1()">`;
    container.appendChild(div);
  });
  updateApaPreviewW1();
}

function getApaValsW1(){
  const v={};
  apaW1Schema[apaW1Type].fields.forEach(f=>{
    const el=document.getElementById('apaw1_'+f.id);
    if(el) v[f.id]=el.value.trim();
  });
  return v;
}

function updateApaPreviewW1(){
  const v = getApaValsW1();
  const hasAny = Object.values(v).some(x=>x.length>0);
  const prev = document.getElementById('apa-w1-preview');
  const intext = document.getElementById('apa-w1-intext');
  if(!prev||!intext) return;
  if(!hasAny){
    prev.innerHTML='Fill in the fields above and your reference will appear here…';
    prev.style.fontStyle='italic';
    prev.style.color='var(--text-muted)';
    intext.textContent='—';
    return;
  }
  prev.innerHTML = apaW1Schema[apaW1Type].ref(v);
  prev.style.fontStyle='normal';
  prev.style.color='var(--text)';
  intext.textContent = apaW1Schema[apaW1Type].intext(v);
}

function plainApa(html){ return html.replace(/<em>/g,'').replace(/<\/em>/g,'').replace(/<strong>/g,'').replace(/<\/strong>/g,''); }

function copyApaW1(){
  const el = document.getElementById('apa-w1-preview');
  if(!el) return;
  navigator.clipboard.writeText(plainApa(el.innerHTML)).catch(()=>{});
  const btn = document.querySelector('[onclick="copyApaW1()"]');
  if(btn){const o=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=o,1600);}
}

function saveApaW1(){
  const v = getApaValsW1();
  const hasAny = Object.values(v).some(x=>x.length>0);
  if(!hasAny) return;
  const html = apaW1Schema[apaW1Type].ref(v);
  const plain = plainApa(html);
  const intext = apaW1Schema[apaW1Type].intext(v);
  apaW1Refs.push({html, plain, intext, type:apaW1Type});
  apaW1Refs.sort((a,b)=>a.plain.localeCompare(b.plain));
  saveApaRefsCookieW1();
  renderRefsW1();
  // Clear fields
  apaW1Schema[apaW1Type].fields.forEach(f=>{
    const el=document.getElementById('apaw1_'+f.id);
    if(el) el.value='';
  });
  updateApaPreviewW1();
  const btn = document.querySelector('[onclick="saveApaW1()"]');
  if(btn){const o=btn.textContent;btn.textContent='Added! ✓';setTimeout(()=>btn.textContent=o,1800);}
}

function deleteRefW1(i){
  apaW1Refs.splice(i,1);
  saveApaRefsCookieW1();
  renderRefsW1();
}

function renderRefsW1(){
  const list = document.getElementById('apa-w1-reflist');
  const count = document.getElementById('apa-w1-refcount');
  if(!list) return;
  if(apaW1Refs.length===0){
    if(count) count.textContent='No references saved yet.';
    list.innerHTML='';
    return;
  }
  if(count) count.textContent=`${apaW1Refs.length} reference${apaW1Refs.length!==1?'s':''} saved — sorted alphabetically.`;
  list.innerHTML = apaW1Refs.map((r,i)=>`
    <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border-soft)">
      <div style="flex:1">
        <div style="font-family:Georgia,serif;font-size:14px;line-height:1.75;color:var(--text);margin-bottom:4px">${r.html}</div>
        <div style="font-size:13px;color:var(--text-muted)">In-text: <span style="font-family:Georgia,serif;color:var(--blue);font-weight:600">${r.intext}</span></div>
      </div>
      <button onclick="deleteRefW1(${i})" style="font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--red-mid);background:none;color:var(--red);cursor:pointer;flex-shrink:0;font-family:inherit;white-space:nowrap">Remove</button>
    </div>
  `).join('');
}

function copyAllRefsW1(){
  const txt = apaW1Refs.map(r=>r.plain).join('\n\n');
  navigator.clipboard.writeText(txt).catch(()=>{});
  const btn = document.querySelector('[onclick="copyAllRefsW1()"]');
  if(btn){const o=btn.textContent;btn.textContent='Copied! ✓';setTimeout(()=>btn.textContent=o,1800);}
}

function resetBibliographyW1(){
  if(!confirm('This will permanently delete all your saved references. Are you sure?')) return;
  apaW1Refs = [];
  saveApaRefsCookieW1();
  renderRefsW1();
}

];

let biasAnswered = [];

function renderBiasQuiz() {
  const container = document.getElementById('bias-quiz');
  if(!container) return;
  biasScenarios.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'bias-scenario';
    div.innerHTML = `<div class="bias-text"><strong>Scenario ${i+1}:</strong> ${s.text}</div>
    <div class="bias-options">${s.options.map((o,j) => `<button class="bias-opt" onclick="answerBias(${i},${j})" id="bias-${i}-${j}">${o}</button>`).join('')}</div>
    <div class="bias-feedback" id="bias-fb-${i}"></div>`;
    container.appendChild(div);
  });
}

function answerBias(scenario, choice) {
  if(biasAnswered.includes(scenario)) return;
  biasAnswered.push(scenario);
  const s = biasScenarios[scenario];
  const correct = choice === s.correct;
  for(let j=0;j<s.options.length;j++){
    const btn = document.getElementById(`bias-${scenario}-${j}`);
    if(!btn) continue;
    btn.disabled = true;
    if(j === s.correct) btn.classList.add('correct');
    else if(j === choice && !correct) btn.classList.add('wrong');
  }
  const fb = document.getElementById(`bias-fb-${scenario}`);
  if(fb) {
    fb.classList.add('show', correct ? 'bf-correct' : 'bf-wrong');
    fb.textContent = (correct ? 'Correct. ' : 'Not quite. ') + s.feedback;
  }
}

        <div class="concept-def">Data that can be ranked or ordered, but the gaps between ranks are not necessarily equal. You know the order, but not how much more one is than another.</div>
        <div class="concept-example"><strong>Hotel examples:</strong> Star rating of hotel (3-star vs 4-star) → ordinal · Service level rating "very good" → ordinal (part of a Likert scale) · Guest satisfaction score → ordinal · Hofstede dimension category (Low/Medium/High) → ordinal</div>
      </div>
      <div class="alert alert-info">What you CAN do: rank, find median, create ordered bar charts.<br>What you CANNOT do: say a 4-star hotel is "twice as good" as a 2-star — the gaps between ranks are not guaranteed equal.</div>
    </div>
    <div id="dt-interval" class="dt-panel">
      <div class="concept-card" style="margin-bottom:10px">
        <div class="concept-term">Interval — equal gaps, no true zero</div>
        <div class="concept-def">Data where the difference between values is meaningful and equal, but there is no absolute zero — zero does not mean "none of the thing."</div>
        <div class="concept-example"><strong>Hotel examples:</strong> Temperature in Celsius (0°C does not mean no temperature) · Hofstede dimension scores (0 does not mean no individualism exists) · Calendar years</div>
      </div>
      <div class="alert alert-info">What you CAN do: calculate averages, compare differences, use line graphs.<br>What you CANNOT do: say "Country A has twice the individualism of Country B" — the zero is not absolute.</div>
    </div>
    <div id="dt-ratio" class="dt-panel">
      <div class="concept-card" style="margin-bottom:10px">
        <div class="concept-term">Ratio — equal gaps + true zero</div>
        <div class="concept-def">The richest level of measurement. Zero means genuinely none of the thing exists. All mathematical operations apply.</div>
        <div class="concept-example"><strong>Hotel examples:</strong> Amount spent on lunch (€25.75) → ratio · Occupancy rate (0% = no rooms occupied) → ratio · RevPAR → ratio · Number of tourist arrivals → ratio · Length of stay in nights → ratio</div>
      </div>
      <div class="alert alert-info">What you CAN do: everything — add, subtract, multiply, divide. "RevPAR of €120 is twice as high as €60" is a valid statement. Use any chart type.</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-learn">?</span>Descriptive statistics — measures of central tendency</div>
    <p style="font-size:13px;color:#444;margin-bottom:12px;line-height:1.5">Descriptive statistics describe your dataset in a way that means something. There are two categories: <strong>central tendency</strong> (what is typical?) and <strong>variability</strong> (how spread out is the data?).</p>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="concept-term">Mean — the average</div>
        <div class="concept-def">Sum all values, divide by the number of values.</div>
        <div class="concept-example">Dataset: 7, 3, 4, 1, 7, 6 → Mean = (7+3+4+1+7+6) / 6 = 28/6 = <strong>4.67</strong><br>Use for: ratio and interval data only</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">Mode — most common value</div>
        <div class="concept-def">The value that appears most frequently in the dataset.</div>
        <div class="concept-example">Dataset: 7, 3, 4, 1, 7, 6 → Mode = <strong>7</strong> (appears twice)<br>Use for: any data level including nominal</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">Median — the middle value</div>
        <div class="concept-def">Arrange all values in order, pick the middle one. If even number of values, average the two middle values.</div>
        <div class="concept-example">Dataset ordered: 1, 3, 4, 6, 7, 7 → two middle values: 4 and 6 → Median = (4+6)/2 = <strong>5</strong><br>Use for: ordinal, interval, ratio data</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-learn">?</span>Descriptive statistics — measures of variability</div>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="concept-term">Range</div>
        <div class="concept-def">The total difference between the minimum and maximum values in your dataset.</div>
        <div class="concept-example">Dataset: 7, 3, 4, 1, 7, 6 → Range = 7 - 1 = <strong>6</strong></div>
      </div>
      <div class="concept-card">
        <div class="concept-term">Variance</div>
        <div class="concept-def">The average squared deviation of each value from the mean. Measures how far each number in the set is from the mean.</div>
        <div class="concept-example">Dataset: 7, 3, 4, 1, 7, 6 → Variance = <strong>5.67</strong></div>
      </div>
      <div class="concept-card">
        <div class="concept-term">Standard deviation</div>
        <div class="concept-def">The average amount of variability in your dataset — how far, on average, each value lies from the mean. Calculated as the square root of the variance.</div>
        <div class="concept-example">St. Dev = √5.67 = <strong>2.42</strong><br>This means values typically sit about 2.42 units from the mean of 4.67</div>
      </div>
    </div>
    <div class="alert alert-info" style="margin-top:10px">In your report, when you look at a graph ask yourself: Is there a lot of variance in the data? Is a mode visible? Where does the average sit? Answering these questions with the graph is what turns description into analysis.</div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-warn">!</span>Measurement level summary — what is valid for each type</div>
    <table class="source-table">
      <thead><tr><th>Level</th><th>Hotel example</th><th>Valid statistics</th><th>Good graph types</th><th>Common mistake</th></tr></thead>
      <tbody>
        <tr><td>Nominal</td><td>Guest nationality, meal type</td><td>Count, mode</td><td>Pie chart, bar chart</td><td class="bad">Calculating an average of categories</td></tr>
        <tr><td>Ordinal</td><td>Star rating, satisfaction score</td><td>Rank, median, mode</td><td>Ordered bar chart</td><td class="bad">Saying gap between ranks is equal</td></tr>
        <tr><td>Interval</td><td>Hofstede scores, temperature</td><td>Mean, median, range</td><td>Line graph, bar chart</td><td class="bad">Saying one value is "twice" another</td></tr>
        <tr><td>Ratio</td><td>RevPAR, occupancy %, arrivals</td><td>All operations</td><td>Any chart type</td><td class="mid">Forgetting to interpret in context</td></tr>
      </tbody>
    </table>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-do">✓</span>Class checklist</div>
    <ul class="checklist">
      ${ck('w3c1-1','I can explain the difference between qualitative and quantitative data')}
      ${ck('w3c1-2','I can classify nominal, ordinal, interval, and ratio data using hotel examples')}
      ${ck('w3c1-3','I can calculate mean, mode, and median for a simple dataset')}
      ${ck('w3c1-4','I understand the difference between variance/range and standard deviation')}
      ${ck('w3c1-5','I know which calculations and chart types are valid for each measurement level')}
    </ul>
  </div>
  `;
}

function setDataTab(id, btn) {
  document.querySelectorAll('.dt-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.dt-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('dt-'+id)?.classList.add('active');
}

}

function renderW4C1(el) {
  el.innerHTML = `
  <div class="section">
    <div class="section-title"><span class="section-icon icon-learn">?</span>From transcript to analysis — why we code</div>
    <p style="font-size:13px;color:#444;line-height:1.6;margin-bottom:10px">A transcript is raw data — it is not analysis. Coding is the process of reading through transcripts systematically and labelling the content so you can find patterns across multiple interviews. Without coding, you cannot write "my interviewees suggest that…" — you can only repeat individual quotes.</p>
    <p style="font-size:13px;color:#444;line-height:1.6;margin-bottom:10px">The approach used in this module is called <strong>grounded theory coding</strong>, which has three phases:</p>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="concept-term">Phase 1: Open coding</div>
        <div class="concept-def">Paraphrase each piece of text to make it manageable. Think of a suitable description for each fragment — unravel the text into short labels.</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">Phase 2: Axial coding</div>
        <div class="concept-def">Group the coded terms. Look for similarities and differences. Create main groups (axes/themes) from your open codes.</div>
      </div>
      <div class="concept-card">
        <div class="concept-term">Phase 3: Selective coding</div>
        <div class="concept-def">Look for relationships between the grouped themes. How do the categories connect to your theoretical framework and research question?</div>
      </div>
    </div>
    <div class="alert alert-red" style="margin-top:10px">Coding is a conditional (C) criterion. Your coding matrix must appear in Appendix C showing both open and axial coding. Missing or superficial coding fails the report regardless of how good the rest is.</div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-learn">?</span>Step 1 — Transcribe your interviews first</div>
    <div class="concept-grid">
      <div class="concept-card">
        <div class="concept-term">By hand</div>
        <div class="concept-def">Type everything out in Word. Label who is speaking clearly (Interviewer: / Respondent: or use initials). Time-consuming but you engage deeply with the content.</div>
      </div>
      <div class="concept-card" style="border-color:#9FE1CB">
        <div class="concept-term" style="color:#085041">Using AI — Revoldiv.com</div>
        <div class="concept-def">Free account available. Upload your audio and it transcribes automatically. Identifies speakers as Speaker 1, 2, 3 etc. — rename them to actual names or roles.</div>
        <div class="concept-example">Always review and correct the output — it makes errors with accents, names, and hospitality jargon. The corrected transcript goes in Appendix B.</div>
      </div>
    </div>
    <div class="alert alert-info" style="margin-top:10px">Transcribe within 24 hours while the conversation is fresh. The transcript of each interview is added to Appendix B of your report — verbatim, labelled, with each speaker identified.</div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-learn">?</span>Step 2 — Open coding: paraphrasing the transcript</div>
    <p style="font-size:13px;color:#444;line-height:1.6;margin-bottom:12px">Open coding means reading through a transcript and attaching a short label to each meaningful fragment. You are paraphrasing what the speaker expressed — stay close to their words, do not interpret yet.</p>
    <div style="background:#f8f7f4;border-radius:10px;padding:14px;border:1px solid #e5e4df;margin-bottom:12px">
      <div class="ib-label">Real example from your teaching materials</div>
      <p style="font-size:12px;color:#666;margin-bottom:8px">Question asked: "What major factors led you into teaching?"</p>
      <table class="source-table" style="margin-top:4px">
        <thead><tr><th>What the respondent said</th><th>Open code (in orange)</th></tr></thead>
        <tbody>
          <tr><td>"I love working with kids and watching them grow"</td><td>love of kids · impact on children's life</td></tr>
          <tr><td>"The flexible schedule really appealed to me"</td><td>flexible schedule</td></tr>
          <tr><td>"My own teacher really inspired me when I was young"</td><td>previous teacher motivated them</td></tr>
          <tr><td>"I wanted to share my passion for the subject"</td><td>desire to share passion</td></tr>
        </tbody>
      </table>
      <p style="font-size:11px;color:#888;margin-top:8px">Apply exactly this logic to your culture interviews — label what the interviewee is expressing about hierarchy, communication style, working culture, etc.</p>
    </div>
    <div class="alert alert-info">For your hotel assignment, open code every meaningful statement about culture, corporate culture, working conditions, management style, sustainability practices, or market conditions. Do this for all interviews before moving to step 3.</div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-learn">?</span>Step 3 — Axial coding: grouping into themes</div>
    <p style="font-size:13px;color:#444;line-height:1.6;margin-bottom:12px">Once you have open coded all transcripts, look for patterns. Which open codes are really talking about the same thing? Group them into broader categories (axes). These must link to your theoretical framework.</p>
    <div style="background:#f8f7f4;border-radius:10px;padding:14px;border:1px solid #e5e4df;margin-bottom:12px">
      <div class="ib-label">Teaching material example — open codes grouped into axial themes</div>
      <table class="source-table" style="margin-top:4px">
        <thead><tr><th>Open codes</th><th>Axial theme (in green/blue/red)</th></tr></thead>
        <tbody>
          <tr><td>love of kids · impact on children's life · helping kids</td><td style="color:#085041">Motivation: child-centred values</td></tr>
          <tr><td>flexible schedule · wanted different students</td><td style="color:#0C447C">Motivation: work-life preferences</td></tr>
          <tr><td>previous teacher motivated them · desire to share passion</td><td style="color:#712B13">Motivation: influential role models</td></tr>
        </tbody>
      </table>
    </div>
    <div style="background:#f8f7f4;border-radius:10px;padding:14px;border:1px solid #e5e4df;margin-bottom:10px">
      <div class="ib-label">For your hotel assignment — map to Hofstede dimensions</div>
      <table class="source-table" style="margin-top:4px">
        <thead><tr><th>Open codes from your interviews</th><th>Axial category</th><th>Hofstede link</th></tr></thead>
        <tbody>
          <tr><td>informal address of superiors · flat hierarchy · open door policy</td><td>Low power distance</td><td>Power Distance Index (PDI)</td></tr>
          <tr><td>collective problem-solving · team decisions · blame avoidance</td><td>Group orientation</td><td>Individualism vs Collectivism (IDV)</td></tr>
          <tr><td>flexible schedule · adapts to change · comfort with ambiguity</td><td>Uncertainty avoidance</td><td>Uncertainty Avoidance Index (UAI)</td></tr>
        </tbody>
      </table>
    </div>
    <div class="alert alert-warn">Axial categories must connect to your theoretical framework. If a category does not link to a cultural model you discussed in your literature review, ask yourself: why is this in my analysis?</div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-learn">?</span>Step 4 — The coding matrix (Appendix C)</div>
    <p style="font-size:13px;color:#444;line-height:1.6;margin-bottom:10px">The matrix shows which themes (axial codes) appeared in which interviews, and what each interviewee said (open codes) under each theme. Not every interviewee will have something pertaining to every axial code — leave the cell blank if they said nothing about that theme.</p>
    <div style="overflow-x:auto;margin-bottom:10px">
    <table class="source-table" style="min-width:580px">
      <thead><tr><th>Axial code (theme)</th><th>Interviewee 1</th><th>Interviewee 2</th><th>Interviewee 3</th><th>Interviewee 4</th></tr></thead>
      <tbody>
        <tr><td><strong>Hierarchy at work</strong></td><td>Had to ask permission for everything</td><td>Many hierarchical levels in the French hotel company</td><td>Superior was often inaccessible</td><td>High degree of dependency on superiors</td></tr>
        <tr><td><strong>Importance of structure and planning</strong></td><td>Superiors didn't follow rules for employees</td><td>Before meetings, agenda was always shared in advance</td><td style="color:#aaa;font-style:italic">—</td><td>Last-minute changes were rare and frowned upon</td></tr>
        <tr><td><strong>Group orientation</strong></td><td style="color:#aaa;font-style:italic">—</td><td>Decisions were always made as a team</td><td>Individual recognition was avoided</td><td>Team lunches were a weekly ritual</td></tr>
      </tbody>
    </table>
    </div>
    <div class="alert alert-info">A theme that appears across all three or four interviews is stronger evidence than one that appears in only one. Note this in your report: "This theme was identified across all interviews, suggesting…" vs "One interviewee mentioned…"</div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-tool">AI</span>Using AI to support your coding — with a real prompt</div>
    <p style="font-size:13px;color:#444;line-height:1.6;margin-bottom:12px">Below is the actual prompt your tutors recommend — modelled on how previous students used it successfully. Always review every code the AI produces before using it. You must be able to defend every code in your oral defence.</p>
    <div style="border:1px solid #e5e4df;border-radius:8px;overflow:hidden;margin-bottom:10px">
      <div style="padding:10px 14px;background:#f8f7f4;font-size:12px;font-weight:600;color:#1a1a1a;display:flex;justify-content:space-between;align-items:center">
        Recommended AI coding prompt (paste your transcripts after this)
        <button class="btn" style="font-size:11px;padding:4px 10px" onclick="copyCodingPrompt()">Copy prompt</button>
      </div>
      <pre id="coding-prompt" style="padding:12px 14px;font-size:12px;line-height:1.6;white-space:pre-wrap;font-family:inherit;color:#444;background:#fff;margin:0">These are [number] interviews. I would like you to:

1. Find recurring themes across all interviews — these will be our AXIAL CODES.
2. Under each interviewee, paraphrase their relevant quotes into OPEN CODES that support those axial codes.
3. Make a CODING MATRIX showing: rows = axial codes, columns = each interviewee, cells = the open codes (paraphrased quotes) from that interviewee that support the axial code. Leave cells blank where an interviewee said nothing about that theme.

The axial codes should relate to cultural dimensions (e.g. Hofstede's Power Distance, Individualism, Uncertainty Avoidance) or corporate culture concepts where relevant.

[PASTE INTERVIEW TRANSCRIPTS HERE]</pre>
    </div>
    <div class="concept-grid">
      <div class="concept-card" style="background:#E1F5EE;border-color:#9FE1CB">
        <div class="concept-term" style="color:#085041">After getting the AI output</div>
        <div class="concept-def" style="color:#085041">Check every open code against your actual transcript. Correct errors. Add codes the AI missed. Remove codes that misrepresent what was said. Connect each axial code explicitly to a Hofstede dimension or cultural theory in your report.</div>
      </div>
      <div class="concept-card" style="background:#FAEEDA;border-color:#FAC775">
        <div class="concept-term" style="color:#633806">Disclose your AI use</div>
        <div class="concept-def" style="color:#633806">Write in your report: "AI (Revoldiv) was used to support transcription. AI was used to support initial open coding. All codes were reviewed and refined by the authors." This is responsible disclosure and protects your integrity.</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title"><span class="section-icon icon-do">✓</span>Class checklist</div>
    <ul class="checklist">
      ${ck('w4c1-1','I can explain the three phases of grounded theory coding (open, axial, selective)')}
      ${ck('w4c1-2','I have transcribed at least one full interview (by hand or using Revoldiv)')}
      ${ck('w4c1-3','I have open coded at least one full interview transcript')}
      ${ck('w4c1-4','I have grouped my open codes into axial categories linked to a named cultural theory')}

      ${ck('w4c1-6','I understand how to use AI for coding support and what I must disclose')}
    </ul>
  </div>
  `;
}

function copyCodingPrompt() {
  const el = document.getElementById('coding-prompt');
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).catch(()=>{});
  const btn = el.previousElementSibling.querySelector('button');
  if(btn){const o=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=o,1500);}
}

function promptCard(title, prompt) {
  const id = 'pc-' + title.replace(/\s+/g,'').replace(/[^a-z0-9]/gi,'').toLowerCase().slice(0,12);
  const escaped = prompt.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
  return `
  <div style="border:1px solid #e5e4df;border-radius:8px;margin-bottom:10px;overflow:hidden">
    <div style="padding:10px 14px;background:#f8f7f4;font-size:12px;font-weight:600;color:#1a1a1a;display:flex;justify-content:space-between;align-items:center">
      ${title}
      <button class="btn" style="font-size:11px;padding:4px 10px" onclick="copyPrompt('${id}')">Copy prompt</button>
    </div>
    <pre id="${id}" style="padding:12px 14px;font-size:12px;line-height:1.6;white-space:pre-wrap;font-family:inherit;color:#444;background:#fff;margin:0">${prompt}</pre>
  </div>`;
}

function copyPrompt(id) {
  const el = document.getElementById(id);
  if(!el) return;
  navigator.clipboard.writeText(el.textContent).catch(()=>{});
  const btn = el.previousElementSibling.querySelector('button');
  if(btn){const o=btn.textContent;btn.textContent='Copied!';setTimeout(()=>btn.textContent=o,1500);}
}
