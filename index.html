  <div style="background:var(--text);border-radius:20px;padding:28px 32px;margin-bottom:24px;position:relative;overflow:hidden">
    <div style="position:absolute;top:-20px;right:-20px;width:180px;height:180px;border-radius:50%;background:rgba(255,255,255,0.04)"></div>
    <div style="position:absolute;bottom:-40px;right:60px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.03)"></div>
    <div style="font-family:'Lexend',sans-serif;font-size:11px;font-weight:700;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px">M4 Intercultural Hospitality · The Global Explorer</div>
    <div style="font-family:'Lexend',sans-serif;font-size:26px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:8px">Your research companion</div>
    <div style="font-size:15px;color:rgba(255,255,255,0.65);line-height:1.6;max-width:560px;margin-bottom:20px">6 weeks · 9 classes · 1 report · 1 oral defence. This tool walks you through every step.</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <div style="background:rgba(255,255,255,0.1);border-radius:10px;padding:12px 18px;text-align:center;min-width:80px">
        <div id="dash-done" style="font-family:'Lexend',sans-serif;font-size:24px;font-weight:700;color:#fff">0</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px">tasks done</div>
      </div>
      <div style="background:rgba(255,255,255,0.1);border-radius:10px;padding:12px 18px;text-align:center;min-width:80px">
        <div id="dash-pct" style="font-family:'Lexend',sans-serif;font-size:24px;font-weight:700;color:var(--teal)">0%</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px">complete</div>
      </div>
      <div style="background:rgba(255,255,255,0.1);border-radius:10px;padding:12px 18px;text-align:center;min-width:80px">
        <div style="font-family:'Lexend',sans-serif;font-size:24px;font-weight:700;color:#fff" id="dash-refs">0</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px">references saved</div>
      </div>
    </div>
  </div>

  <!-- ── TIMELINE ── -->
  <div style="background:var(--warm-white);border:2px solid var(--border);border-radius:20px;padding:28px;margin-bottom:24px">
    <div style="font-family:'Lexend',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px">6-week journey</div>
    <div style="font-size:14px;color:var(--text-muted);margin-bottom:24px">Click any class to jump straight in</div>

    <!-- Timeline track -->
    <div style="position:relative;padding-bottom:8px">

      <!-- Connecting line -->
      <div style="position:absolute;top:28px;left:28px;right:28px;height:3px;background:var(--border);border-radius:2px;z-index:0"></div>
      <div id="timeline-progress-line" style="position:absolute;top:28px;left:28px;height:3px;background:var(--teal);border-radius:2px;z-index:1;width:0%;transition:width 0.6s"></div>

      <!-- Week nodes -->
      <div style="display:flex;justify-content:space-between;position:relative;z-index:2;margin-bottom:20px">
        ${weekMeta.map((w,wi) => `
          <div style="display:flex;flex-direction:column;align-items:center;gap:8px;flex:1">
            <div onclick="go('${w.classes[0]}')" style="width:56px;height:56px;border-radius:50%;background:${w.light};border:3px solid ${w.colour};display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;font-family:'Lexend',sans-serif;font-size:13px;font-weight:700;color:${w.colour}" title="Go to ${w.label}"
              onmouseover="this.style.transform='scale(1.12)'" onmouseout="this.style.transform='scale(1)'">
              W${wi+1}
            </div>
            <div style="font-family:'Lexend',sans-serif;font-size:11px;font-weight:700;color:${w.colour};text-align:center">${w.label}</div>
            ${w.pitch ? `<div style="font-size:10px;background:${w.light};color:${w.colour};border:1px solid ${w.colour};border-radius:10px;padding:2px 7px;font-weight:700">PITCH</div>` : ''}
          </div>
        `).join('')}
      </div>

      <!-- Week 7 submit node -->
      <div style="display:flex;justify-content:flex-end;position:relative;z-index:2;margin-top:-8px">
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div style="width:56px;height:56px;border-radius:50%;background:var(--red-light);border:3px solid var(--red);display:flex;align-items:center;justify-content:center;font-size:18px" title="Week 7 — Submit & Defence">🎓</div>
          <div style="font-family:'Lexend',sans-serif;font-size:11px;font-weight:700;color:var(--red);text-align:center">Week 7<br>SUBMIT</div>
        </div>
      </div>

    </div>

    <!-- Class cards per week -->
    <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-top:20px">
      ${weekMeta.map(w => `
        <div style="display:flex;flex-direction:column;gap:8px">
          ${w.classes.map((cid,ci) => `
            <button onclick="go('${cid}')"
              style="background:${w.light};border:2px solid ${w.colour};border-radius:10px;padding:10px 10px;text-align:left;cursor:pointer;font-family:inherit;transition:all 0.18s;width:100%"
              onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
              <div style="font-family:'Lexend',sans-serif;font-size:10px;font-weight:700;color:${w.colour};text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">Class ${ci+1}</div>
              <div style="font-size:12px;font-weight:600;color:var(--text);line-height:1.35">${w.titles[ci]}</div>
            </button>
          `).join('')}
        </div>
      `).join('')}
    </div>

  </div>

  <!-- ── TWO COLUMN: RUBRIC + FORMATTING ── -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">

    <!-- RUBRIC -->
    <div style="background:var(--warm-white);border:2px solid var(--red);border-radius:20px;padding:0;overflow:hidden">

      <!-- Header -->
      <div style="padding:22px 24px 18px;border-bottom:2px solid var(--red-light);background:var(--red-light)">
        <div style="font-family:'Lexend',sans-serif;font-size:10px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px">Assessment criteria</div>
        <div style="font-family:'Lexend',sans-serif;font-size:22px;font-weight:700;color:var(--text);letter-spacing:-0.5px;line-height:1.15;margin-bottom:6px">⚖️ The rubric</div>
        <div style="font-size:13px;color:var(--text-soft);line-height:1.6">Your assessors work through this list. Every gate below is a potential fail. Read it carefully.</div>
      </div>

      <!-- CONDITIONAL block -->
      <div style="padding:18px 24px;border-bottom:1px solid var(--border-soft)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
          <span style="font-size:16px">🚨</span>
          <div style="font-family:'Lexend',sans-serif;font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:1.5px">Conditional — every single one must pass</div>
        </div>
        <div style="background:var(--red-light);border:1px solid var(--red-mid);border-radius:10px;padding:4px 0;margin-bottom:10px">
          ${['Ethics & integrity — no plagiarism, AI use disclosed, professional tone',
             'Language & structure — grammar, APA7 headings, consistent formatting',
             'Word count — 2,700–3,300 words (body text only, not references)',
             'Sources — course literature cited, all sources recent and relevant',
             'Interviews — questions based on cultural theory; findings in the body text',
             'Appendices A (questions) · B (transcripts ≥ 3) · C (coding matrix)'
            ].map((t,i,arr) => `
            <div style="display:flex;gap:12px;align-items:flex-start;padding:10px 14px;${i<arr.length-1?'border-bottom:1px solid rgba(224,62,62,0.12)':''}">
              <span style="font-size:14px;flex-shrink:0;margin-top:1px">❌</span>
              <span style="font-size:13px;color:var(--text-soft);line-height:1.55">${t}</span>
            </div>`).join('')}
        </div>
        <div style="background:var(--red-light);border-radius:8px;padding:10px 14px;border-left:3px solid var(--red)">
          <div style="font-size:12px;color:var(--red);line-height:1.6"><strong>One NO anywhere here</strong> = the report fails. No partial credit.</div>
        </div>
      </div>

      <!-- LENIENT block -->
      <div style="padding:18px 24px;border-bottom:1px solid var(--border-soft)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
          <span style="font-size:16px">⚠️</span>
          <div style="font-family:'Lexend',sans-serif;font-size:11px;font-weight:700;color:var(--purple);text-transform:uppercase;letter-spacing:1.5px">Lenient — at most 2 NOs permitted</div>
        </div>
        <div style="background:var(--purple-light);border:1px solid var(--purple-mid);border-radius:10px;padding:4px 0;margin-bottom:10px">
          ${['Topics explained and justified — not just described',
             'Insights reported in a nuanced, balanced way',
             'National / regional culture — theory + interview evidence',
             'Corporate culture — theory + interview evidence',
             'SDGs explained as relevant to the specific national context',
             'Market environment — macro level AND micro level',
             'Competitor analysis included and named specifically',
             'Quantitative info — ≥ 3 sources, stats, ≥ 2 graph types, contextualised'
            ].map((t,i,arr) => `
            <div style="display:flex;gap:12px;align-items:flex-start;padding:9px 14px;${i<arr.length-1?'border-bottom:1px solid rgba(139,61,255,0.1)':''}">
              <span style="font-size:14px;flex-shrink:0;margin-top:1px">🔶</span>
              <span style="font-size:13px;color:var(--text-soft);line-height:1.55">${t}</span>
            </div>`).join('')}
        </div>
        <div style="background:var(--purple-light);border-radius:8px;padding:10px 14px;border-left:3px solid var(--purple)">
          <div style="font-size:12px;color:var(--purple);line-height:1.6"><strong>Three or more NOs</strong> = the report fails, regardless of how good the rest is.</div>
        </div>
      </div>

      <!-- DEFENCE block -->
      <div style="padding:18px 24px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
          <span style="font-size:16px">🎤</span>
          <div style="font-family:'Lexend',sans-serif;font-size:11px;font-weight:700;color:var(--amber);text-transform:uppercase;letter-spacing:1.5px">Oral defence — if the report passes</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
          ${['Problem & goal','Information literacy','Research methods','Qual & quant','Communication','Helicopter view'
            ].map(c => `
            <div style="background:var(--amber-light);border:1px solid var(--amber-mid);border-radius:7px;padding:7px 10px;font-size:12px;color:var(--text-soft);font-family:'Lexend',sans-serif;font-weight:600">${c}</div>
          `).join('')}
        </div>
        <div style="background:var(--amber-light);border-radius:8px;padding:10px 14px;border-left:3px solid var(--amber)">
          <div style="font-size:12px;color:var(--text-soft);line-height:1.6">Grade = average of all 6, rounded to nearest 0.5. <strong style="color:var(--amber)">At most 1 criterion may be Insufficient.</strong> More than 1 = fail. No-show or arriving late = ND.</div>
        </div>
      </div>

    </div>

    <!-- FORMATTING -->
    <div style="background:var(--warm-white);border:2px solid var(--border);border-radius:20px;padding:24px">
      <div style="font-family:'Lexend',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:4px">Report formatting</div>
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">The Global Explorer · APA7 style</div>

      <!-- Structure visual -->
      <div style="margin-bottom:16px">
        <div style="font-family:'Lexend',sans-serif;font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px">Report structure</div>
        ${[
          {letter:'A', label:'Title + authors', note:'Main heading, bold, centred, font size 16', num:false, colour:'var(--w1)'},
          {letter:'B', label:'Introduction', note:'What · Why · How · Structure announcement · Research question', num:true, colour:'var(--w2)'},
          {letter:'C', label:'Body chapters', note:'Culture · Corporate culture · SDGs · Market · Competitors', num:true, colour:'var(--w3)'},
          {letter:'D', label:'Conclusion', note:'Main findings · Answer research question', num:true, colour:'var(--w4)'},
          {letter:'E', label:'References', note:'APA7 · alphabetical order', num:false, colour:'var(--w5)'},
          {letter:'F', label:'Appendices', note:'A: Interview questions · B: Transcripts · C: Coding matrix', num:false, colour:'var(--text-muted)'},
        ].map(s => `
          <div style="display:flex;gap:10px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border-soft)">
            <div style="width:26px;height:26px;border-radius:8px;background:${s.colour};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Lexend',sans-serif;font-size:12px;font-weight:700;color:#fff">${s.letter}</div>
            <div>
              <div style="font-family:'Lexend',sans-serif;font-size:13px;font-weight:700;color:var(--text);display:flex;gap:6px;align-items:center">
                ${s.label}
                ${s.num ? '<span style="font-size:10px;background:var(--teal-light);color:var(--teal);padding:1px 7px;border-radius:10px;font-weight:700">NUMBERED</span>' : ''}
              </div>
              <div style="font-size:12px;color:var(--text-muted);line-height:1.5;margin-top:2px">${s.note}</div>
            </div>
          </div>
        `).join('')}
      </div>

      <!-- Layout rules -->
      <div style="font-family:'Lexend',sans-serif;font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px">Layout rules</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${[
          ['Word count','2,700–3,300 words\n(body text only)'],
          ['Font','Calibri 11 or Times New Roman 12'],
          ['Headings','1. Chapter · 1.1 Section · 1.1.1 Sub'],
          ['Line spacing','1.0'],
          ['Page numbers','Bottom · centred · TNR 10'],
          ['Graphs','Numbered (Figure 1…) · APA caption below'],
        ].map(([k,v]) => `
          <div style="background:var(--cream);border-radius:8px;padding:10px 12px;border:1px solid var(--border-soft)">
            <div style="font-family:'Lexend',sans-serif;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">${k}</div>
            <div style="font-size:13px;color:var(--text);line-height:1.5;white-space:pre-line">${v}</div>
          </div>
        `).join('')}
      </div>
    </div>

  </div>

  <!-- ── KEY DATES BANNER ── -->
  <div style="background:var(--warm-white);border:2px solid var(--border);border-radius:20px;padding:24px;margin-bottom:8px">
    <div style="font-family:'Lexend',sans-serif;font-size:17px;font-weight:700;color:var(--text);margin-bottom:16px">Key milestones</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
      ${[
        {wk:'Week 2', event:'Pitch 1 — culture findings', colour:'var(--w2)'},
        {wk:'Week 4', event:'Pitch 2 — market findings', colour:'var(--w3)'},
        {wk:'Week 6', event:'Final pitch — full report', colour:'var(--w4)'},
        {wk:'Week 7', event:'Report submitted', colour:'var(--w5)'},
        {wk:'Week 7–8', event:'Oral defence', colour:'var(--red)'},
        {wk:'Week 9', event:'Resit (if needed)', colour:'var(--text-muted)'},
      ].map(m => `
        <div style="background:var(--cream);border-radius:10px;padding:12px 14px;border-left:4px solid ${m.colour}">
          <div style="font-family:'Lexend',sans-serif;font-size:11px;font-weight:700;color:${m.colour};text-transform:uppercase;letter-spacing:0.8px;margin-bottom:4px">${m.wk}</div>
          <div style="font-size:13px;color:var(--text);font-weight:600;line-height:1.4">${m.event}</div>
        </div>
      `).join('')}
    </div>
  </div>
  `;

  // Update stats
  const done = Object.keys(state).filter(k => k.startsWith('ck-') && state[k]).length;
  const total = 47;
  const pct = Math.round(done/total*100);
  const dashDone = document.getElementById('dash-done');
  const dashPct = document.getElementById('dash-pct');
  const dashRefs = document.getElementById('dash-refs');
  if(dashDone) dashDone.textContent = done;
  if(dashPct) dashPct.textContent = pct + '%';

  // Load ref count from cookie
  try {
    const refCookie = document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('m4_apa_refs_v1='));
    if(refCookie && dashRefs) {
      const refs = JSON.parse(decodeURIComponent(refCookie.split('=').slice(1).join('=')));
      dashRefs.textContent = refs.length;
    }
  } catch(e) {}

  // Animate timeline progress line
  setTimeout(() => {
    const line = document.getElementById('timeline-progress-line');
    if(line) line.style.width = Math.min(pct, 80) + '%';
  }, 100);
}

// ─── INIT ────────────────────────────────────────────────────────
function init() {
  state = loadCookie();
  go('dashboard');
}

init();
</script>
</body>
</html>
